// ─── PLAY SCENE ──────────────────────────────────────────────────────────────
class PlayScene extends Phaser.Scene {
    constructor() { super('PlayScene'); }

    init(data) {
        this.hero        = HEROES[data.heroId || 'saint'];
        this.wave        = data.wave   || 1;
        this.score       = data.score  || 0;
        this.level       = data.level  || 'factory';
        this.unionPct    = 100;
        this.strikeCD    = 0;
        this.powerCD     = 0;
        this.waveCleared = false;
        this.spawnQueue  = 0;
        this.gameOver    = false;
        this.combo       = 0;
        this.comboMult   = 1;
        this.comboLabel  = null;
        this.primeHPBg       = null;
        this.primeHPFg       = null;
        this.primeHPLbl      = null;
        this._droneIntroShown = false;

        // Rotate backgrounds by wave so each run feels different (3 visual stages)
        if (this.level === 'factory') {
            // Stage 1: Factory floor (waves 1–6) — 9 images cycle
            const fBgs = ['bg_factory', 'bg_factory_a', 'bg_factory_b', 'bg_factory_c', 'bg_factory_d',
                          'bg_factory_ne', 'bg_factory_nf', 'bg_factory_ng', 'bg_factory_nh'];
            this.bgKey = fBgs[(this.wave - 1) % fBgs.length];
        } else if (this.wave >= 10) {
            // Stage 3: The Rotunda (wave 10+) — deep inside city hall
            const rBgs = ['bg_rotunda_a', 'bg_rotunda_b', 'bg_rotunda_c',
                          'bg_cityhall_a', 'bg_cityhall_b', 'bg_cityhall_c'];
            this.bgKey = rBgs[(this.wave - 10) % rBgs.length];
        } else {
            // Stage 2: City Hall outer (waves 7–9)
            const cBgs = ['bg_cityhall_a', 'bg_cityhall_b', 'bg_cityhall_c',
                          'bg_cityhall_nd', 'bg_cityhall_ne'];
            this.bgKey = cBgs[Math.max(0, this.wave - 7) % cBgs.length];
        }
    }

    create() {
        if (this.level === 'cityhall') {
            this.drawCityHallBG();
            // Union poster overlay — textured propaganda on the rotunda walls, slow pan
            const bgImg = this.add.image(W / 2, H / 2, this.bgKey)
                .setAlpha(0.14).setDisplaySize(W * 1.15, H * 1.15);
            const panRange = Math.round((W * 0.15) / 2);
            this.tweens.add({ targets: bgImg, x: W / 2 + panRange,
                duration: 25000, ease: 'Sine.InOut', yoyo: true, repeat: -1 });
        } else {
            const bgImg = this.add.image(W / 2, H / 2, this.bgKey)
                .setAlpha(0.35).setDisplaySize(W * 1.15, H * 1.15);
            const panRange = Math.round((W * 0.15) / 2);
            this.tweens.add({ targets: bgImg, x: W / 2 + panRange,
                duration: 20000, ease: 'Sine.InOut', yoyo: true, repeat: -1 });
        }
        drawDecoBorder(this);

        // Ground — different tile for each level
        const groundKey = this.level === 'cityhall' ? 'ground_marble' : 'ground_tile';
        this.ground = this.physics.add.staticGroup();
        for (let x = 0; x < W; x += 64) {
            this.ground.create(x + 32, GROUND_Y + 16, groundKey);
        }

        this.player = this.physics.add.sprite(144, GROUND_Y - 60, this.hero.sheetKey, 0);
        this.player.setCollideWorldBounds(true);
        this.player.setDisplaySize(60, 80);
        // Store base scales so animation tweens can multiply from the correct baseline
        this.player._bsx = this.player.scaleX;
        this.player._bsy = this.player.scaleY;

        // Hero aura — colored elliptical glow at feet, pulses with hero color
        this.heroAura = this.add.ellipse(144, GROUND_Y - 4, 70, 18, this.hero.color, 0).setDepth(0);
        this.tweens.add({
            targets: this.heroAura,
            alpha: 0.28,
            scaleX: 1.12, scaleY: 1.08,
            duration: 1600, ease: 'Sine.InOut',
            yoyo: true, repeat: -1,
        });
        this.physics.add.collider(this.player, this.ground);

        this.robots = this.physics.add.group();
        this.physics.add.collider(this.robots, this.ground);
        this.physics.add.overlap(this.player, this.robots, this.onHit, null, this);

        // Build conveyor belts AFTER player + robots exist (colliders need both objects)
        this.buildConveyors();

        this.spawnQueue = this.calcWaveCount();
        const interval = Math.max(400, 1400 - this.wave * 80);
        this.spawnTimer = this.time.addEvent({
            delay: interval, callback: this.spawnNext,
            callbackScope: this, repeat: this.spawnQueue - 1
        });

        this.buildUI();

        this.cursors    = this.input.keyboard.createCursorKeys();
        this.strikeKey  = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
        this.powerKey   = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.X);
        this.restartKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.R);
        this.peeKey     = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.P);
        this.escKey     = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);

        this.touch = { left: false, right: false, up: false, strikeFired: false, powerFired: false };
        this.createTouchButtons();

        this.strikeRing = this.add.circle(0, 0, 80, C.gold, 0).setDepth(10);

        // Pause state
        this.gamePaused    = false;
        this.pauseOverlay  = null;
        this.pauseText     = null;
        this.pauseSubText  = null;

        // Tap anywhere to resume when paused
        this.input.on('pointerdown', () => {
            if (this.gamePaused && !this.gameOver && !this.waveCleared) this.togglePause();
        });

        // Animation state
        this.animState    = 'idle';
        this.walkPhase    = 0;
        this.walkTimer    = null;
        this.prevGrounded = true;
        this.peeTimer     = null;
        this.player.anims.play(this.hero.id + '_idle', true);
    }

    calcWaveCount() { return Math.min(3 + this.wave * 2, 20); }

    getBeltDefs() {
        return [
            { cx: 204, y: 333, w: 240, dir:  1 },   // left belt → arrows right
            { cx: 756, y: 333, w: 240, dir: -1 },   // right belt ← arrows left
        ];
    }

    buildConveyors() {
        this.beltDefs = this.getBeltDefs();

        // Physics bodies — invisible static sprites used as platform colliders
        this.conveyors = this.physics.add.staticGroup();
        this.beltDefs.forEach(b => {
            const s = this.conveyors.create(b.cx, b.y, 'ground_tile');
            s.setDisplaySize(b.w, 12).setAlpha(0).refreshBody();
        });
        // Top-only collision: only process when object is moving downward (no side-sticking)
        this.physics.add.collider(this.player, this.conveyors,
            null, (p) => p && p.body && p.body.velocity.y >= 0, this);
        this.physics.add.collider(this.robots, this.conveyors,
            null, (r) => r && r.body && r.body.velocity.y >= 0, this);

        // Static structure — drawn once (support legs + belt frame); depth -1 so belts render behind player
        const sg = this.add.graphics().setDepth(-1);
        this.beltDefs.forEach(b => {
            const lx = b.cx - b.w / 2, rx = b.cx + b.w / 2;
            sg.lineStyle(3, 0x223344, 0.75);
            sg.lineBetween(lx + 22, b.y + 6, lx + 22, GROUND_Y);
            sg.lineBetween(rx - 22, b.y + 6, rx - 22, GROUND_Y);
            sg.lineStyle(2, 0x3a5566, 0.9);
            sg.strokeRect(lx, b.y - 6, b.w, 12);
        });

        // Animated belt surface — redrawn in animateBelts(); depth -1 to stay behind player
        this.beltGfx = this.add.graphics().setDepth(-1);
        this.beltOffset = 0;
        this.platSpawnToggle = false;  // alternates which belt gets the next platform spawn
    }

    spawnNext() {
        if (this.waveCleared) return;

        // Wave 10: Chronos Prime — sole enemy, override entire wave
        const isPrime = (this.wave === 10) && (this.spawnQueue >= this.calcWaveCount());
        if (isPrime) {
            this.spawnQueue = 0;  // no more spawns this wave
            if (this.spawnTimer) this.spawnTimer.remove(false);  // stop queued spawn calls
            const spawnX = W / 2 + 200, spawnY = GROUND_Y - 70;
            const bot = this.robots.create(spawnX, spawnY, 'boss_chronos');
            bot.setVelocityX(-55);
            bot.setDisplaySize(96, 110);
            bot.setCollideWorldBounds(false);
            bot.isBoss      = true;
            bot.isPrime     = true;
            bot.primePhase  = 1;
            bot.hp          = 5;
            bot.maxHp       = 5;
            bot.isAdmin     = false;
            bot.isShielded  = false;
            bot.scoreVal    = 1000;
            bot._chargeCD   = 180;
            bot._jumpCD     = 0;
            bot._primeSpeed = 55;
            bot.setTint(0xcc4444);
            this.showBossTitle('CHRONOS PRIME');
            this.showPrimeHPBar();
            return;
        }

        const isBoss  = !isPrime && (this.wave % 3 === 0) && (this.spawnQueue <= 1);
        const isAdmin = this.level === 'cityhall' && !isBoss && Math.random() > 0.5;
        const isDrone = !isBoss && !isAdmin && this.wave >= 4 && Math.random() < 0.20;
        const isShielded = !isBoss && !isAdmin && !isDrone && this.wave >= 2 && Math.random() > 0.7;

        let key;
        if (isBoss)       key = 'boss_chronos';
        else if (isAdmin) key = 'enemy_admin';
        else if (isDrone) key = 'enemy_drone';
        else key = Math.random() > 0.6 ? 'enemy_heavy' : 'enemy_enforcer';

        // Speed scales with wave (+6% per wave above 1)
        const speedMult = 1 + (this.wave - 1) * 0.06;

        // Platform spawn: 25% chance for non-boss, non-drone enemies from wave 2 onward
        const isPlatform = !isBoss && !isDrone && this.wave >= 2 && Math.random() < 0.25;

        let spawnX, spawnY, velX;
        if (isDrone) {
            const fromLeft = Math.random() < 0.5;
            spawnX = fromLeft ? Phaser.Math.Between(-60, -20) : Phaser.Math.Between(W + 20, W + 60);
            spawnY = GROUND_Y - 185;
            velX   = fromLeft ? Phaser.Math.Between(55, 80) : -Phaser.Math.Between(55, 80);
        } else if (isPlatform) {
            // Alternate between left and right conveyor belt
            this.platSpawnToggle = !this.platSpawnToggle;
            const belt = this.beltDefs[this.platSpawnToggle ? 0 : 1];
            // Spawn at the input end — far edge in direction of travel, drops onto belt
            spawnX = belt.dir > 0 ? belt.cx - belt.w / 2 + 10 : belt.cx + belt.w / 2 - 10;
            spawnY = belt.y - 70;
            velX   = belt.dir * Math.round(Phaser.Math.Between(42, 65) * speedMult);
        } else if (isBoss) {
            spawnX = Phaser.Math.Between(852, 948);
            spawnY = GROUND_Y - 70;
            velX   = -28;
        } else {
            // Bidirectional ground spawn (50/50 left or right)
            const fromLeft = Math.random() < 0.5;
            spawnX = fromLeft ? Phaser.Math.Between(10, 90) : Phaser.Math.Between(852, 948);
            spawnY = GROUND_Y - 50;
            const baseSpeed = isAdmin ? Phaser.Math.Between(60, 90) : Phaser.Math.Between(42, 75);
            velX   = fromLeft
                ? Math.round(baseSpeed * speedMult)
                : -Math.round(baseSpeed * speedMult);
        }

        const bot = this.robots.create(spawnX, spawnY, key);
        bot.setVelocityX(velX);

        if (isDrone) {
            bot.body.setAllowGravity(false);
            bot.setDisplaySize(44, 30);
            bot.isDrone    = true;
            bot._sineTime  = Math.random() * Math.PI * 2;
            bot.velX       = velX;
            bot.hp         = 1;
            bot.maxHp      = 1;
            bot.scoreVal   = 120;
            bot.isBoss     = false;
            bot.isAdmin    = false;
            bot.isShielded = false;
            // First drone of the run: show a one-time "jump to hit" hint
            if (!this._droneIntroShown) {
                this._droneIntroShown = true;
                this.time.delayedCall(600, () => {
                    this.showPopup(W / 2, GROUND_Y - 230, '↑  JUMP TO HIT DRONES!', C.tealS);
                });
            }
        } else {
            bot.setDisplaySize(isBoss ? 80 : isAdmin ? 56 : 52, isBoss ? 88 : isAdmin ? 70 : 64);
            bot.isBoss     = isBoss;
            bot.isAdmin    = isAdmin;
            bot.isShielded = isShielded || isAdmin;  // admins always shielded
            bot.hp         = isBoss ? 3 : (isAdmin || isShielded) ? 2 : 1;
            bot.maxHp      = bot.hp;
            if (bot.isShielded) bot.setTint(isAdmin ? 0x88aaff : 0x44aaff);
        }
        bot.setCollideWorldBounds(false);
        this.spawnQueue--;
    }

    // ── UI ───────────────────────────────────────────────────────────────────
    buildUI() {
        this.add.rectangle(22 + 149, 13 + 9, 302, 22, 0x000000, 0.7).setOrigin(0.5);
        this.barBg = this.add.rectangle(22, 13, 300, 20, 0x3d2a1e).setOrigin(0, 0);
        this.barFg = this.add.rectangle(23, 14, 298, 18, C.gold).setOrigin(0, 0);
        this.add.text(22, 37, 'UNION STRENGTH', { fontSize: '10px', fill: C.goldS, letterSpacing: 2 });

        this.add.rectangle(22 + 149, 58 + 6, 302, 14, 0x000000, 0.7).setOrigin(0.5);
        this.pwrBg = this.add.rectangle(22, 58, 300, 12, 0x1a2a28).setOrigin(0, 0);
        this.pwrFg = this.add.rectangle(23, 59, 0, 10, C.teal).setOrigin(0, 0);
        this.pwrLabel = this.add.text(22, 73, this.hero.powerName + ' [X]', { fontSize: '10px', fill: C.tealS, letterSpacing: 1 });

        this.waveText  = this.add.text(W - 16, 12, 'WAVE ' + this.wave, { fontSize: '18px', fill: C.goldS, fontStyle: 'bold' }).setOrigin(1, 0);
        this.scoreText = this.add.text(W - 16, 36, 'SCORE: ' + this.score, { fontSize: '12px', fill: C.creamS }).setOrigin(1, 0);
        this.levelText = this.add.text(W - 16, 56, this.level === 'cityhall' ? 'CITY HALL' : 'FACTORY', {
            fontSize: '10px', fill: C.tealS, letterSpacing: 2
        }).setOrigin(1, 0);

        this.add.text(W / 2, 12, this.hero.name.toUpperCase(), { fontSize: '12px', fill: C.goldS, letterSpacing: 2, fontStyle: 'bold' }).setOrigin(0.5, 0);
        this.remainText = this.add.text(W / 2, 30, this.spawnQueue + ' incoming', { fontSize: '11px', fill: C.tealS }).setOrigin(0.5, 0);

        // Pause button — top center, always visible
        const pauseBtn = this.add.text(W / 2, 2, '⏸', { fontSize: '13px', fill: C.goldS })
            .setOrigin(0.5, 0).setDepth(60).setInteractive({ useHandCursor: true });
        pauseBtn.on('pointerover',  () => pauseBtn.setAlpha(1.0));
        pauseBtn.on('pointerout',   () => pauseBtn.setAlpha(0.55));
        pauseBtn.on('pointerdown',  () => { if (!this.gameOver && !this.waveCleared) this.togglePause(); });
        pauseBtn.setAlpha(0.55);
        // NOTE: updateUI() is intentionally NOT called here.
        // All text objects above are initialized with their real initial values,
        // and update() calls updateUI() every frame — so the first tick corrects
        // any bar sizes without risking a null-frame crash during create().
    }

    togglePause() {
        this.gamePaused = !this.gamePaused;
        if (this.gamePaused) {
            this.physics.pause();
            if (!this.pauseOverlay) {
                const g = this.add.graphics().setDepth(80);
                g.fillStyle(0x000000, 0.72);
                g.fillRect(0, 0, W, H);
                this.pauseOverlay = g;
                this.pauseText = this.add.text(W / 2, H / 2 - 22, 'PAUSED', {
                    fontSize: '38px', fill: C.goldS, fontStyle: 'bold', letterSpacing: 10
                }).setOrigin(0.5).setDepth(81);
                this.pauseSubText = this.add.text(W / 2, H / 2 + 22, 'TAP  OR  ESC  TO  RESUME', {
                    fontSize: '12px', fill: C.creamS, letterSpacing: 3
                }).setOrigin(0.5).setDepth(81);
            } else {
                this.pauseOverlay.setVisible(true);
                this.pauseText.setVisible(true);
                this.pauseSubText.setVisible(true);
            }
        } else {
            this.physics.resume();
            this.pauseOverlay?.setVisible(false);
            this.pauseText?.setVisible(false);
            this.pauseSubText?.setVisible(false);
        }
    }

    updateUI() {
        const pct = Math.max(0, this.unionPct);
        this.barFg.setDisplaySize(Math.floor(298 * pct / 100), 18);
        this.barFg.setFillStyle(pct > 60 ? C.gold : pct > 30 ? C.orange : C.crimson);

        const pwrReady = this.powerCD === 0;
        const pwrPct   = Math.max(0, 1 - this.powerCD / this.hero.powerCD);
        this.pwrFg.setDisplaySize(Math.floor(298 * pwrPct), 10);
        this.pwrFg.setFillStyle(pwrReady ? C.gold : C.teal);
        this.pwrLabel.setText(this.hero.powerName + (pwrReady ? ' [X] READY' : ' [X] ' + Math.ceil(this.powerCD / 60) + 's'));
        this.pwrLabel.setColor(pwrReady ? C.goldS : C.tealS);

        this.waveText.setText('WAVE ' + this.wave);
        this.scoreText.setText('SCORE: ' + this.score);
        const alive = this.robots.countActive(true);
        this.remainText.setText(this.spawnQueue > 0
            ? this.spawnQueue + ' incoming + ' + alive + ' active'
            : alive + ' remaining');

        // Update ★ power touch button to show cooldown
        if (this.touchPowerLabel) {
            if (pwrReady) {
                this.touchPowerLabel.setText('★').setColor('#ffffff').setAlpha(1);
            } else {
                this.touchPowerLabel.setText(Math.ceil(this.powerCD / 60) + 's').setColor(C.tealS).setAlpha(0.75);
            }
        }
    }

    // ── UPDATE ───────────────────────────────────────────────────────────────
    update(time, delta) {
        // ESC toggles pause (always checked, even mid-game)
        if (Phaser.Input.Keyboard.JustDown(this.escKey) && !this.gameOver && !this.waveCleared) {
            this.togglePause();
        }
        if (this.gamePaused || this.waveCleared || this.gameOver) return;

        const left  = this.cursors.left.isDown  || this.touch.left;
        const right = this.cursors.right.isDown || this.touch.right;
        if (this.animState !== 'pee') {
            if (left)       { this.player.setVelocityX(-this.hero.speed); this.player.setFlipX(true); }
            else if (right) { this.player.setVelocityX(this.hero.speed);  this.player.setFlipX(false); }
            else            { this.player.setVelocityX(0); }
        }

        // Keep aura tracking the player feet
        this.heroAura.setPosition(this.player.x, this.player.y + 38);

        // Belt push — slide player sideways while standing on a conveyor
        if (this.player.body.blocked.down && this.player.body.bottom < GROUND_Y - 40) {
            for (const b of this.beltDefs) {
                const lx = b.cx - b.w / 2, rx = b.cx + b.w / 2;
                if (this.player.x > lx && this.player.x < rx) {
                    this.player.body.velocity.x += b.dir * 85;
                    break;
                }
            }
        }

        if ((this.cursors.up.isDown || this.touch.up) && this.player.body.blocked.down) {
            this.player.setVelocityY(-440);
            SFX.jump();
        }

        if (this.strikeCD > 0) this.strikeCD--;
        if ((Phaser.Input.Keyboard.JustDown(this.strikeKey) || this.touch.strikeFired) && this.strikeCD === 0) {
            this.touch.strikeFired = false;
            this.performStrike();
        }

        if (this.powerCD > 0) this.powerCD--;
        if ((Phaser.Input.Keyboard.JustDown(this.powerKey) || this.touch.powerFired) && this.powerCD === 0) {
            this.touch.powerFired = false;
            this.performSpecialPower();
        }

        if (Phaser.Input.Keyboard.JustDown(this.restartKey)) {
            if (this.gamePaused) this.physics.resume();
            this.scene.start('HeroSelectScene', { wave: 1, score: 0 });
        }

        if (Phaser.Input.Keyboard.JustDown(this.peeKey)
            && this.animState === 'idle'
            && this.player.body.blocked.down
            && !this.waveCleared && !this.gameOver) {
            this.startPeeAnim();
        }

        [...this.robots.children.entries].forEach(r => { if (r && r.active && (r.x < -100 || r.x > W + 100)) r.destroy(); });

        // Robot AI: belt push + occasional platform jump
        this.robots.children.entries.forEach(r => {
            if (!r.active) return;

            // ── Drone AI: sine-wave flight ─────────────────────────────────
            if (r.isDrone) {
                r._sineTime += 0.04;
                r.setY(GROUND_Y - 185 + Math.sin(r._sineTime) * 22);
                r.body.setVelocityX(r.velX);
                r.setFlipX(r.velX < 0);   // camera eye faces direction of travel
                return;
            }

            // ── Chronos Prime phase AI ─────────────────────────────────────
            if (r.isPrime) {
                const targetPhase = r.hp >= 4 ? 1 : r.hp >= 2 ? 2 : 3;
                if (targetPhase !== r.primePhase) {
                    r.primePhase = targetPhase;
                    if (targetPhase === 2) {
                        // Spawn 2 enforcer minibots near the boss
                        for (let m = 0; m < 2; m++) {
                            const mx = r.x + (m === 0 ? -80 : 80);
                            const mb = this.robots.create(mx, GROUND_Y - 50, 'enemy_enforcer');
                            mb.setDisplaySize(52, 64);
                            mb.setCollideWorldBounds(false);
                            mb.isBoss = false; mb.isAdmin = false; mb.isShielded = false;
                            mb.hp = 1; mb.maxHp = 1;
                            mb.setVelocityX(m === 0 ? -60 : 60);
                        }
                        this.showPopup(r.x, r.y - 60, 'REINFORCEMENTS!', C.crimsonS);
                        this.cameras.main.shake(180, 0.01);
                    }
                    if (targetPhase === 3) {
                        r._primeSpeed = Math.round((r._primeSpeed || 55) * 1.6);
                        this.showPopup(r.x, r.y - 60, 'ENRAGED!', C.crimsonS);
                        this.cameras.main.shake(220, 0.015);
                    }
                }

                const dir = this.player.x < r.x ? -1 : 1;
                if (r.primePhase === 2) {
                    r._chargeCD = (r._chargeCD || 180) - 1;
                    if (r._chargeCD <= 0) {
                        r.body.setVelocityX(dir * 260);
                        r._chargeCD = 180;
                    } else {
                        r.body.setVelocityX(dir * (r._primeSpeed || 55));
                    }
                } else if (r.primePhase === 3) {
                    r.body.setVelocityX(dir * (r._primeSpeed || 88));
                    if (r.body.blocked.down) {
                        if (!r._jumpCD) r._jumpCD = Phaser.Math.Between(90, 160);
                        if (--r._jumpCD <= 0) {
                            r._jumpCD = Phaser.Math.Between(90, 160);
                            r.body.setVelocityY(-420);
                        }
                    }
                } else {
                    r.body.setVelocityX(dir * (r._primeSpeed || 55));
                }
                return;
            }

            if (r.body.blocked.down) {
                // Apply belt velocity when standing on a conveyor
                if (r.body.bottom < GROUND_Y - 40) {
                    for (const b of this.beltDefs) {
                        const lx = b.cx - b.w / 2, rx = b.cx + b.w / 2;
                        if (r.x > lx && r.x < rx) { r.body.velocity.x += b.dir * 60; break; }
                    }
                }
                // Jump toward player when player is elevated or robot is near a belt column
                if (!r.isBoss) {
                    if (!r._jumpCD) r._jumpCD = Phaser.Math.Between(120, 280);
                    if (--r._jumpCD <= 0) {
                        r._jumpCD = Phaser.Math.Between(120, 280);
                        const playerHigh = this.player.y < GROUND_Y - 60;
                        const nearBelt = this.beltDefs.some(b => Math.abs(r.x - b.cx) < b.w * 0.55);
                        if (playerHigh || nearBelt) r.setVelocityY(-400);
                    }
                }
            }
        });

        if (this.spawnQueue <= 0 && this.robots.countActive(true) === 0 && !this.waveCleared) {
            this.waveCleared = true;
            this.time.delayedCall(400, () => this.showWaveCleared());
        }

        // Update prime HP bar if active
        if (this.primeHPFg) {
            const primeBot = this.robots.children.entries.find(r => r.active && r.isPrime);
            if (primeBot) {
                this.primeHPFg.setDisplaySize(Math.floor(298 * primeBot.hp / primeBot.maxHp), 8);
            }
        }

        // Track combo label to player position
        if (this.comboLabel && this.combo > 1) {
            this.comboLabel.setPosition(this.player.x, this.player.y - 65);
        }

        // ── Player animation state machine ────────────────────────────────────
        const grounded = this.player.body.blocked.down;
        const moving   = Math.abs(this.player.body.velocity.x) > 20;

        if (this.animState !== 'pee') {
            if (!grounded && this.prevGrounded) {
                // Just left the ground — jump stretch
                this.animState = 'jump';
                this.stopIdleAnim();
                this.stopWalkAnim();
                this.playJumpAnim();
            } else if (grounded && !this.prevGrounded) {
                // Just landed — squash then restore
                this.playLandAnim();
                if (moving) { this.animState = 'walk'; this.startWalkAnim(); }
                else          this.animState = 'idle';
            } else if (grounded) {
                if (moving && this.animState !== 'walk') {
                    this.animState = 'walk';
                    this.stopIdleAnim();
                    this.startWalkAnim();
                } else if (!moving && this.animState !== 'idle') {
                    this.animState = 'idle';
                    this.stopWalkAnim();
                    this.startIdleAnim();
                }
            }
        }
        this.prevGrounded = grounded;
        // ─────────────────────────────────────────────────────────────────────

        this.animateBelts(delta);
        this.updateUI();
    }

    // ── BELT ANIMATION ────────────────────────────────────────────────────────
    animateBelts(delta) {
        if (!this.beltGfx) return;
        this.beltOffset = (this.beltOffset + delta * 0.07) % 16;
        const g = this.beltGfx;
        g.clear();
        const stripeColor = this.level === 'factory' ? 0x3a5566 : 0x665040;
        this.beltDefs.forEach(b => {
            const lx = b.cx - b.w / 2, rx = b.cx + b.w / 2;
            const top = b.y - 5, bot = b.y + 5;
            // Belt surface
            g.fillStyle(0x18222e, 1);
            g.fillRect(lx + 1, top, b.w - 2, 10);
            // Scrolling diagonal stripes
            g.lineStyle(1, stripeColor, 0.85);
            const off = b.dir * this.beltOffset;
            for (let i = -1; i < (b.w / 16) + 2; i++) {
                const sx = lx + i * 16 + off;
                const x1 = Math.max(sx, lx + 1), x2 = Math.min(sx + 9, rx - 1);
                if (x2 > x1) g.lineBetween(x1, top, x2, bot);
            }
            // Direction arrow at center
            g.fillStyle(0x5588aa, 0.8);
            const ax = b.cx, ay = b.y;
            if (b.dir > 0) {
                g.fillTriangle(ax + 9, ay, ax - 3, ay - 5, ax - 3, ay + 5);
            } else {
                g.fillTriangle(ax - 9, ay, ax + 3, ay - 5, ax + 3, ay + 5);
            }
        });
    }

    // ── BASIC STRIKE ─────────────────────────────────────────────────────────
    performStrike() {
        this.strikeCD = this.hero.strikeCD;
        SFX.strike();
        const px = this.player.x, py = this.player.y;

        // Show strike pose frame, then resume movement animation
        this.player.anims.play(this.hero.id + '_strike', true);
        this.time.delayedCall(160, () => {
            if (!this.waveCleared && !this.gameOver) {
                if (this.animState === 'walk') this.player.anims.play(this.hero.id + '_walk', true);
                else this.player.anims.play(this.hero.id + '_idle', true);
            }
        });

        // Strike lunge tween — visual forward-punch feel on top of frame animation
        this.tweens.add({
            targets: this.player,
            angle:  (this.player.flipX ? 1 : -1) * 22,
            scaleX: this.player._bsx * 1.16,
            scaleY: this.player._bsy * 0.84,
            duration: 85, ease: 'Quad.Out',
            yoyo: true,
            onComplete: () => this.player.setAngle(0),
        });

        this.strikeRing.setPosition(px, py).setAlpha(0.65).setScale(1);
        this.tweens.add({ targets: this.strikeRing, scaleX: 2.2, scaleY: 2.2, alpha: 0,
            duration: 300, ease: 'Expo.Out', onComplete: () => this.strikeRing.setScale(1) });

        let hit = false;
        let hitRx = px, hitRy = py, hitIsBoss = false, hitIsAdmin = false;
        this.robots.children.entries.forEach(robot => {
            if (!robot.active) return;
            if (Phaser.Math.Distance.BetweenPoints(this.player, robot) >= this.hero.strikeRange) return;
            // Drones can only be hit while player is airborne (at least 50px above ground)
            if (robot.isDrone && this.player.y > GROUND_Y - 110) return;
            if (robot.isShielded && this.hero.id !== 'dachshund') {
                this.showPopup(robot.x, robot.y - 30, 'SHIELDED', C.tealS);
                this.cameras.main.shake(40, 0.003);
                SFX.shield();
                this.resetCombo();
                return;
            }
            robot.hp--;
            this.cameras.main.shake(70, 0.005);
            if (robot.hp <= 0) {
                hitRx = robot.x; hitRy = robot.y;
                hitIsBoss = robot.isBoss || robot.isPrime; hitIsAdmin = robot.isAdmin;
                const basePts = robot.isPrime ? 1000 : robot.isDrone ? 120 : robot.isBoss ? 300 : robot.isAdmin ? 200 : robot.isShielded ? 150 : 100;
                this.combo++;
                const newMult = this.comboToMult(this.combo);
                if (newMult !== this.comboMult) { this.comboMult = newMult; this.showComboPopup(newMult); }
                const finalPts = basePts * this.comboMult;
                this.score += finalPts;
                this.showPopup(robot.x, robot.y - 40, '+' + finalPts, C.goldS);

                if (robot.isDrone) {
                    // Drone death — zap FX then drop with gravity
                    robot.isDrone = false;
                    robot.body.setAllowGravity(true);
                    robot.body.setVelocityY(60);
                    this.destroyEffect(robot.x, robot.y, C.teal, false, false);
                    SFX.drone();
                    this.time.delayedCall(300, () => { if (robot.active) robot.destroy(); });
                } else if (robot.isPrime) {
                    // Chronos Prime defeated — victory
                    const bx = robot.x, by = robot.y;
                    robot.setVisible(false);
                    robot.body.enable = false;
                    this.destroyEffect(bx, by, C.crimson, true, false);
                    this.destroyEffect(bx, by + 10, C.gold, true, false);
                    SFX.destroy(true);
                    this.cameras.main.shake(500, 0.025);
                    this.waveCleared = true;
                    // Clean up prime HP bar
                    if (this.primeHPBg) { this.primeHPBg.destroy(); this.primeHPBg = null; }
                    if (this.primeHPFg) { this.primeHPFg.destroy(); this.primeHPFg = null; }
                    if (this.primeHPLbl) { this.primeHPLbl.destroy(); this.primeHPLbl = null; }
                    this.time.delayedCall(100, () => { if (robot.active) robot.destroy(); });
                    this.time.delayedCall(1400, () => {
                        saveHS(this.score);
                        this.scene.start('StoryScene', { beatIndex: 2, heroId: this.hero.id, wave: this.wave, score: this.score });
                    });
                } else {
                    const bx = robot.x, by = robot.y, bf = robot.isBoss, sf = robot.isShielded;
                    robot.setVisible(false);
                    robot.body.enable = false;
                    this.destroyEffect(bx, by, C.gold, bf, sf);
                    SFX.destroy(bf);
                    this.time.delayedCall(bf ? 100 : 50, () => { if (robot.active) robot.destroy(); });
                }
            } else {
                hitRx = robot.x; hitRy = robot.y;
                hitIsBoss = robot.isBoss || robot.isPrime; hitIsAdmin = robot.isAdmin;
                robot.setTint(0xff4444);
                this.time.delayedCall(120, () => { if (robot.active) robot.clearTint(); });
                SFX.hit();
            }
            hit = true;
        });

        if (!hit) { SFX.miss(); this.resetCombo(); }
        this.showPopup(px, py - 50, hit ? 'STRIKE!' : 'MISS', hit ? C.goldS : C.orangeS);
        this.strikeEffects(hit, hitRx, hitRy, hitIsBoss, hitIsAdmin);
    }

    strikeEffects(hit, hitX, hitY, isBoss, isAdmin) {
        const px = this.player.x, py = this.player.y;
        const facing = this.player.flipX ? Math.PI : 0;

        // Directional slash trail — 3 hero-colored arcs fanning in facing direction
        const slashG = this.add.graphics().setDepth(11);
        [[-0.45, 55, 4, 0.75], [0, 70, 3, 0.55], [0.45, 85, 2, 0.35]].forEach(([off, r, w, a]) => {
            const span = 0.65, mid = facing + off;
            slashG.lineStyle(w, this.hero.color, a);
            slashG.beginPath();
            slashG.arc(px, py, r, mid - span / 2, mid + span / 2, false);
            slashG.strokePath();
        });
        this.tweens.add({ targets: slashG, scaleX: 1.6, scaleY: 1.6, alpha: 0,
            duration: 200, ease: 'Quad.Out', onComplete: () => slashG.destroy() });

        if (!hit) return;

        // Impact flash at contact point
        const flash = this.add.circle(hitX, hitY, 24, 0xffffff, 0.9).setDepth(13);
        this.tweens.add({ targets: flash, scaleX: 2.2, scaleY: 2.2, alpha: 0,
            duration: 80, ease: 'Quad.Out', onComplete: () => flash.destroy() });

        // Fast sharp ring at contact point
        const hitRing = this.add.graphics().setDepth(12);
        hitRing.lineStyle(3, 0xffffff, 0.95);
        hitRing.strokeCircle(hitX, hitY, 30);
        this.tweens.add({ targets: hitRing, scaleX: 2.4, scaleY: 2.4, alpha: 0,
            duration: 160, ease: 'Expo.Out', onComplete: () => hitRing.destroy() });

        // Vignette flash on boss/admin kill
        if (isBoss || isAdmin) {
            const vig = this.add.rectangle(W / 2, H / 2, W, H, 0xffffff, 0).setDepth(9);
            this.tweens.add({ targets: vig, alpha: 0.10, duration: 60, ease: 'Quad.In',
                yoyo: true, onComplete: () => vig.destroy() });
            this.cameras.main.shake(90, 0.009);
        }
    }

    // ── SPECIAL POWERS ───────────────────────────────────────────────────────
    performSpecialPower() {
        this.powerCD = this.hero.powerCD;
        if (this.hero.id === 'saint')     this.powerUnityHowl();
        if (this.hero.id === 'shepherd')  this.powerAuthorityBark();
        if (this.hero.id === 'dachshund') this.powerTechSabotage();
    }

    powerUnityHowl() {
        SFX.power('saint');
        this.player.anims.play('saint_special', true);
        this.time.delayedCall(500, () => {
            if (!this.waveCleared && !this.gameOver) this.player.anims.play('saint_idle', true);
        });
        this.cameras.main.shake(300, 0.018);
        const cx = this.player.x, cy = this.player.y;
        this.showPopup(cx, cy - 70, '— UNITY HOWL —', C.goldS);

        // 3 concentric expanding rings with eye stamps along each
        for (let ring = 0; ring < 3; ring++) {
            this.time.delayedCall(ring * 90, () => {
                const g = this.add.graphics().setDepth(12);
                g.lineStyle(3, C.gold, 0.8);
                g.strokeCircle(cx, cy, 40);
                this.tweens.add({ targets: g, scaleX: 8, scaleY: 8, alpha: 0,
                    duration: 600, ease: 'Sine.Out', onComplete: () => g.destroy() });

                // 6 eye stamps evenly spaced around the ring radius
                for (let e = 0; e < 6; e++) {
                    const ea = (e / 6) * Math.PI * 2;
                    const er = 60 + ring * 20;
                    this.time.delayedCall(ring * 50, () => {
                        this.drawDecoEye(cx + Math.cos(ea) * er, cy + Math.sin(ea) * er, C.gold, 12);
                    });
                }
            });
        }

        this.time.delayedCall(60, () => this.drawDecoEye(cx, cy, C.gold, 14));

        this.time.delayedCall(200, () => {
            this.robots.children.entries.forEach(robot => {
                if (!robot.active) return;
                const pts = robot.isBoss ? 250 : robot.isAdmin ? 180 : robot.isShielded ? 120 : 80;
                this.score += pts;
                this.showPopup(robot.x, robot.y - 40, '+' + pts, C.goldS);
                const bx = robot.x, by = robot.y, bf = robot.isBoss, sf = robot.isShielded;
                robot.setVisible(false);
                robot.body.enable = false;
                this.destroyEffect(bx, by, C.gold, bf, sf);
                SFX.destroy(bf);
                this.time.delayedCall(bf ? 100 : 50, () => { if (robot.active) robot.destroy(); });
            });
        });
    }

    powerAuthorityBark() {
        SFX.power('shepherd');
        this.player.anims.play('shepherd_special', true);
        this.time.delayedCall(500, () => {
            if (!this.waveCleared && !this.gameOver) this.player.anims.play('shepherd_idle', true);
        });
        this.cameras.main.shake(200, 0.012);
        const cx = this.player.x, cy = this.player.y;
        const dir = this.player.flipX ? -1 : 1;
        this.showPopup(cx, cy - 70, '— AUTHORITY BARK —', C.tealS);

        for (let i = 0; i < 5; i++) {
            this.time.delayedCall(i * 55, () => {
                const g = this.add.graphics().setDepth(12);
                const r = 55 + i * 22;
                g.lineStyle(2, C.teal, 0.7 - i * 0.1);
                g.beginPath();
                g.arc(cx, cy, r, dir > 0 ? -0.8 : Math.PI - 0.8, dir > 0 ? 0.8 : Math.PI + 0.8, false);
                g.strokePath();

                // Eye glyphs at 3 points along the arc crest
                [-0.4, 0, 0.4].forEach(offset => {
                    const baseAngle = dir > 0 ? 0 : Math.PI;
                    const ex = cx + Math.cos(baseAngle + offset) * r;
                    const ey = cy + Math.sin(baseAngle + offset) * r;
                    g.lineStyle(1, C.teal, 0.55);
                    g.strokeCircle(ex, ey, 5);
                    g.fillStyle(C.teal, 0.35);
                    g.fillCircle(ex, ey, 2);
                });

                this.tweens.add({ targets: g, x: dir * (80 + i * 35), alpha: 0,
                    duration: 480, ease: 'Cubic.Out', onComplete: () => g.destroy() });
            });
        }

        this.time.delayedCall(140, () => {
            this.robots.children.entries.forEach(robot => {
                if (!robot.active) return;
                robot.setVelocityX(dir * 620);
                robot.setVelocityY(-160);
                this.score += robot.isBoss ? 200 : robot.isAdmin ? 160 : robot.isShielded ? 100 : 60;
                this.time.delayedCall(750, () => { if (robot.active) robot.destroy(); });
            });
        });
    }

    powerTechSabotage() {
        SFX.power('dachshund');
        this.player.anims.play('dachshund_special', true);
        this.time.delayedCall(500, () => {
            if (!this.waveCleared && !this.gameOver) this.player.anims.play('dachshund_idle', true);
        });
        this.cameras.main.shake(150, 0.01);
        const cx = this.player.x, cy = this.player.y;
        this.showPopup(cx, cy - 70, '— TECH SABOTAGE —', C.tealS);

        const g = this.add.graphics().setDepth(12);
        for (let i = 0; i < 16; i++) {
            const angle = (i / 16) * Math.PI * 2;
            const len = Phaser.Math.Between(50, 130);
            g.lineStyle(1, C.teal, 0.85);
            g.beginPath();
            g.moveTo(cx, cy);
            g.lineTo(cx + Math.cos(angle) * len, cy + Math.sin(angle) * len);
            g.strokePath();
        }
        this.tweens.add({ targets: g, alpha: 0, duration: 500, onComplete: () => g.destroy() });

        this.time.delayedCall(60, () => this.drawDecoEye(cx, cy, C.teal, 14));

        this.time.delayedCall(120, () => {
            this.robots.children.entries.forEach(robot => {
                if (!robot.active) return;
                if (robot.isShielded || robot.isBoss || robot.isAdmin) {
                    const pts = robot.isBoss ? 280 : robot.isAdmin ? 200 : 130;
                    this.score += pts;
                    this.showPopup(robot.x, robot.y - 40, '+' + pts, C.tealS);
                    const bx = robot.x, by = robot.y, bf = robot.isBoss, sf = robot.isShielded;
                    robot.setVisible(false);
                    robot.body.enable = false;
                    this.destroyEffect(bx, by, C.teal, bf, sf);
                    SFX.destroy(bf);
                    this.time.delayedCall(bf ? 100 : 50, () => { if (robot.active) robot.destroy(); });
                } else {
                    robot.clearTint();
                    robot.isShielded = false;
                }
            });
        });
    }

    // ── PLAYER ANIMATION ─────────────────────────────────────────────────────
    startIdleAnim() {
        this.player.setAngle(0);
        this.player.anims.play(this.hero.id + '_idle', true);
    }

    stopIdleAnim() { /* frame anims switch automatically on the next play() call */ }

    startWalkAnim() {
        if (this.walkTimer) return;
        this.walkPhase = 0;
        this.player.anims.play(this.hero.id + '_walk', true);
        this.walkTimer = this.time.addEvent({
            delay: 130, callback: this.stepWalk, callbackScope: this, loop: true,
        });
        this.stepWalk();
    }

    stepWalk() {
        // Footstep dust puff on every other step; frame animation handles body pose
        const even = this.walkPhase % 2 === 0;
        if (even && this.player.body.blocked.down) {
            const dx = this.player.x + (this.player.flipX ? 14 : -14);
            const dy = GROUND_Y - 2;
            const puff = this.add.ellipse(dx, dy, 10, 6, this.hero.color, 0.45).setDepth(1);
            this.tweens.add({
                targets: puff,
                x: dx + (this.player.flipX ? 18 : -18),
                y: dy - 12,
                scaleX: 2.4, scaleY: 1.8,
                alpha: 0,
                duration: 280, ease: 'Quad.Out',
                onComplete: () => puff.destroy(),
            });
        }
        this.walkPhase++;
    }

    stopWalkAnim() {
        if (this.walkTimer) { this.walkTimer.remove(); this.walkTimer = null; }
        this.tweens.add({ targets: this.player, angle: 0, duration: 80 });
    }

    startPeeAnim() {
        if (this.animState === 'pee') return;
        if (!this.player.body.blocked.down) return;
        this.animState = 'pee';
        this.stopWalkAnim();
        this.player.setVelocityX(0);
        // Freeze on idle frame so body stays still
        this.player.anims.play(this.hero.id + '_idle', true);
        this.player.anims.pause();

        // Draw a raised back leg as a Graphics overlay
        this._peeLegs = this.add.graphics().setDepth(this.player.depth + 1);
        this._updatePeeLegGfx();

        // Stream starts ~300ms in (mid-hold)
        this.time.delayedCall(300, () => {
            if (this.animState === 'pee') this._spawnPeeStream();
        });
        // End animation after ~1.1s
        this.time.delayedCall(1100, () => {
            if (this._peeLegs) { this._peeLegs.destroy(); this._peeLegs = null; }
            if (!this.waveCleared && !this.gameOver) {
                this.animState = 'idle';
                this.player.anims.resume();
                this.startIdleAnim();
            }
            this._spawnPeeFinishDots();
        });
    }

    _updatePeeLegGfx() {
        if (!this._peeLegs) return;
        const g   = this._peeLegs;
        g.clear();
        // dir: +1 = facing right (back of dog is on the left), -1 = facing left
        const dir = this.player.flipX ? -1 : 1;
        // Hip root is behind the dog body (negative X when facing right)
        const hipX  = this.player.x - dir * 12;
        const hipY  = this.player.y + 8;
        const kneeX = hipX + dir * 14;   // knee: forward and upward
        const kneeY = hipY - 18;
        const pawX  = hipX + dir * 22;   // paw: further forward, slightly down
        const pawY  = hipY - 10;
        g.lineStyle(8, this.hero.color, 0.88);
        g.beginPath();
        g.moveTo(hipX, hipY);
        g.lineTo(kneeX, kneeY);
        g.lineTo(pawX, pawY);
        g.strokePath();
        g.fillStyle(this.hero.color, 0.8);
        g.fillCircle(pawX, pawY, 5);     // paw
    }

    _spawnPeeStream() {
        const dir = this.player.flipX ? 1 : -1;
        const px = this.player.x + dir * 18;
        const py = this.player.y + 10;
        for (let i = 0; i < 6; i++) {
            this.time.delayedCall(i * 55, () => {
                if (this.animState !== 'pee') return;
                const dot = this.add.circle(
                    px + Phaser.Math.Between(-3, 3), py, 2.5, C.gold, 0.7
                ).setDepth(3);
                this.tweens.add({
                    targets: dot,
                    x: dot.x + Phaser.Math.Between(-5, 5),
                    y: dot.y + 30,
                    alpha: 0, duration: 260, ease: 'Quad.In',
                    onComplete: () => dot.destroy(),
                });
            });
        }
    }

    _spawnPeeFinishDots() {
        const px = this.player.x, py = GROUND_Y - 2;
        for (let i = 0; i < 4; i++) {
            const d = this.add.circle(px + Phaser.Math.Between(-8, 8), py, 2, C.gold, 0.5).setDepth(3);
            this.tweens.add({
                targets: d, y: py - 5, alpha: 0, duration: 180, ease: 'Quad.Out',
                onComplete: () => d.destroy(),
            });
        }
    }

    playJumpAnim() {
        this.player.anims.play(this.hero.id + '_jump', true);
        this.tweens.add({
            targets: this.player,
            scaleX: this.player._bsx * 0.82, scaleY: this.player._bsy * 1.22,
            duration: 120, ease: 'Quad.Out', yoyo: true, hold: 80,
        });
    }

    playLandAnim() {
        SFX.land();
        this.tweens.add({
            targets: this.player,
            angle: 0, scaleX: this.player._bsx * 1.32, scaleY: this.player._bsy * 0.70,
            duration: 75, ease: 'Quad.Out', yoyo: true,
            onComplete: () => { if (this.animState === 'idle') this.startIdleAnim(); },
        });
        // Landing impact ring radiating from feet
        const ring = this.add.ellipse(this.player.x, GROUND_Y - 2, 28, 10, this.hero.color, 0.55).setDepth(1);
        this.tweens.add({
            targets: ring,
            scaleX: 4.5, scaleY: 1.6, alpha: 0,
            duration: 320, ease: 'Quad.Out',
            onComplete: () => ring.destroy(),
        });
    }

    // ── VISUAL HELPERS ───────────────────────────────────────────────────────
    drawDecoEye(x, y, color, depth) {
        const g = this.add.graphics().setDepth(depth || 14);
        g.lineStyle(2, color, 0.85);
        g.beginPath();
        g.arc(x, y + 17, 33, 3.67, 5.75, false);
        g.strokePath();
        g.beginPath();
        g.arc(x, y - 17, 33, 0.53, 2.61, false);
        g.strokePath();
        g.strokeCircle(x, y, 8);
        g.fillStyle(color, 0.55);
        g.fillCircle(x, y, 4);
        this.tweens.add({ targets: g, alpha: 0, scaleX: 2.4, scaleY: 2.4,
            duration: 650, ease: 'Cubic.Out', onComplete: () => g.destroy() });
    }

    burstEffect(x, y, color) { this.destroyEffect(x, y, color, false, false); }

    destroyEffect(x, y, color, isBoss, isShielded) {
        const ringColor = isShielded ? C.teal : color;

        // Layer 1 — inner flash (immediate)
        const flash = this.add.graphics().setDepth(15);
        flash.fillStyle(0xffffff, 0.9);
        flash.fillCircle(x, y, isBoss ? 28 : 18);
        this.tweens.add({ targets: flash, scaleX: 3.4, scaleY: 3.4, alpha: 0,
            duration: 120, ease: 'Quad.Out', onComplete: () => flash.destroy() });

        // Layer 2 — shrapnel lines + debris dots (50ms)
        this.time.delayedCall(50, () => {
            const count = isBoss ? 14 : 8;
            const lines = this.add.graphics().setDepth(15);
            for (let i = 0; i < count; i++) {
                const a = (i / count) * Math.PI * 2 + Math.random() * 0.3;
                const len = Phaser.Math.Between(22, 48);
                lines.lineStyle(Phaser.Math.Between(1, 3), ringColor, 0.85);
                lines.beginPath();
                lines.moveTo(x, y);
                lines.lineTo(x + Math.cos(a) * len, y + Math.sin(a) * len);
                lines.strokePath();
            }
            this.tweens.add({ targets: lines, scaleX: 2.2, scaleY: 2.2, alpha: 0,
                duration: 280, ease: 'Quad.Out', onComplete: () => lines.destroy() });

            const dots = this.add.graphics().setDepth(15);
            dots.fillStyle(ringColor, 0.9);
            for (let i = 0; i < 8; i++) {
                const a = (i / 8) * Math.PI * 2;
                dots.fillCircle(x + Math.cos(a) * 30, y + Math.sin(a) * 30, 5);
            }
            this.tweens.add({ targets: dots, scaleX: 2.5, scaleY: 2.5, alpha: 0,
                duration: 350, ease: 'Cubic.Out', onComplete: () => dots.destroy() });
        });

        // Layer 3 — outer ring (100ms)
        this.time.delayedCall(100, () => {
            const ring = this.add.graphics().setDepth(14);
            ring.lineStyle(3, ringColor, 0.75);
            ring.strokeCircle(x, y, 24);
            this.tweens.add({ targets: ring, scaleX: 4.5, scaleY: 4.5, alpha: 0,
                duration: 300, ease: 'Expo.Out', onComplete: () => ring.destroy() });
        });

        // Shielded extras — two quick teal crack-rings
        if (isShielded) {
            [0, 40].forEach(d => this.time.delayedCall(d, () => {
                const sr = this.add.graphics().setDepth(15);
                sr.lineStyle(2, C.teal, 0.85);
                sr.strokeCircle(x, y, 32);
                this.tweens.add({ targets: sr, scaleX: 3.8, scaleY: 3.8, alpha: 0,
                    duration: 220, ease: 'Expo.Out', onComplete: () => sr.destroy() });
            }));
        }

        // Boss extras — large shockwave + deco eye
        if (isBoss) {
            const extra = this.add.graphics().setDepth(15);
            extra.fillStyle(color, 0.55);
            extra.fillCircle(x, y, 36);
            this.tweens.add({ targets: extra, scaleX: 2.8, scaleY: 2.8, alpha: 0,
                duration: 200, ease: 'Quad.Out', onComplete: () => extra.destroy() });
            this.time.delayedCall(80, () => {
                const shock = this.add.graphics().setDepth(14);
                shock.lineStyle(5, color, 0.65);
                shock.strokeCircle(x, y, 45);
                this.tweens.add({ targets: shock, scaleX: 6, scaleY: 6, alpha: 0,
                    duration: 500, ease: 'Expo.Out', onComplete: () => shock.destroy() });
                this.drawDecoEye(x, y, color, 14);
            });
        }
    }

    showPopup(x, y, msg, color) {
        const t = this.add.text(x, y, msg, {
            fontSize: '18px', fill: color, fontStyle: 'bold', stroke: '#000', strokeThickness: 3
        }).setOrigin(0.5).setDepth(16);
        this.tweens.add({ targets: t, y: y - 46, alpha: 0, duration: 700, onComplete: () => t.destroy() });
    }

    // ── COMBO MULTIPLIER ─────────────────────────────────────────────────────
    comboToMult(n) {
        if (n >= 7) return 5;
        if (n >= 4) return 3;
        if (n >= 2) return 2;
        return 1;
    }

    resetCombo() {
        if (this.combo === 0) return;
        this.combo = 0;
        this.comboMult = 1;
        if (this.comboLabel) {
            this.tweens.add({ targets: this.comboLabel, alpha: 0, duration: 200,
                onComplete: () => { if (this.comboLabel) { this.comboLabel.setText(''); this.comboLabel.setAlpha(1); } }
            });
        }
    }

    showComboPopup(mult) {
        const labels = { 2: '2× STREAK', 3: '3× HOT!', 5: '5× UNSTOPPABLE!' };
        const colors = { 2: C.goldS, 3: C.orangeS, 5: C.crimsonS };
        if (!this.comboLabel) {
            this.comboLabel = this.add.text(this.player.x, this.player.y - 65, '',
                { fontSize: '14px', fontStyle: 'bold', letterSpacing: 2, stroke: '#000', strokeThickness: 2 }
            ).setOrigin(0.5).setDepth(20);
        }
        this.comboLabel.setText(labels[mult]).setColor(colors[mult]).setAlpha(1);
        this.tweens.killTweensOf(this.comboLabel);
        this.tweens.add({ targets: this.comboLabel, scaleX: 1.3, scaleY: 1.3,
            duration: 120, ease: 'Back.Out', yoyo: true });
    }

    // ── BOSS HELPERS ──────────────────────────────────────────────────────────
    showBossTitle(name) {
        const t = this.add.text(W / 2, 90, name, {
            fontSize: '28px', fill: C.crimsonS, fontStyle: 'bold', letterSpacing: 6,
            stroke: '#000', strokeThickness: 4
        }).setOrigin(0.5).setDepth(55).setAlpha(0).setScale(0.4);
        this.tweens.add({ targets: t, alpha: 1, scaleX: 1, scaleY: 1,
            duration: 400, ease: 'Back.Out',
            onComplete: () => {
                this.time.delayedCall(1400, () => {
                    this.tweens.add({ targets: t, alpha: 0, duration: 400, onComplete: () => t.destroy() });
                });
            }
        });
    }

    showPrimeHPBar() {
        this.primeHPBg  = this.add.rectangle(W / 2, H - 18, 302, 12, 0x3d1a1a).setOrigin(0.5).setDepth(55);
        this.primeHPFg  = this.add.rectangle(W / 2 - 149, H - 18, 298, 8, C.crimson).setOrigin(0, 0.5).setDepth(56);
        this.primeHPLbl = this.add.text(W / 2, H - 32, 'CHRONOS PRIME', {
            fontSize: '10px', fill: C.crimsonS, letterSpacing: 3
        }).setOrigin(0.5).setDepth(56);
    }

    // ── COLLISION ────────────────────────────────────────────────────────────
    onHit(player, robot) {
        if (!robot.active || !robot.body || !player.body) return;

        // ── STOMP: player falling from above ──────────────────────────────
        if (player.body.velocity.y > 150 && player.body.bottom <= robot.body.top + 18) {
            if (robot._stomped) return;
            robot._stomped = true;

            const pts = robot.isPrime ? 500 : robot.isBoss ? 500 : robot.isAdmin ? 350 : robot.isShielded ? 225 : 150;
            robot.hp--;
            this.score += pts;
            this.showPopup(robot.x, robot.y - 40, 'STOMP! +' + pts, C.orangeS);
            SFX.stomp();

            if (robot.hp <= 0) {
                if (robot.isPrime) {
                    // Prime killed by stomp — trigger victory sequence
                    robot.setVisible(false); robot.body.enable = false;
                    this.destroyEffect(robot.x, robot.y, C.crimson, true, false);
                    this.destroyEffect(robot.x, robot.y + 10, C.gold, true, false);
                    SFX.destroy(true);
                    this.cameras.main.shake(500, 0.025);
                    this.waveCleared = true;
                    if (this.primeHPBg) { this.primeHPBg.destroy(); this.primeHPBg = null; }
                    if (this.primeHPFg) { this.primeHPFg.destroy(); this.primeHPFg = null; }
                    if (this.primeHPLbl) { this.primeHPLbl.destroy(); this.primeHPLbl = null; }
                    this.time.delayedCall(100, () => { if (robot.active) robot.destroy(); });
                    this.time.delayedCall(1400, () => {
                        saveHS(this.score);
                        this.scene.start('StoryScene', { beatIndex: 2, heroId: this.hero.id, wave: this.wave, score: this.score });
                    });
                } else {
                    const bx = robot.x, by = robot.y, bf = robot.isBoss, sf = robot.isShielded;
                    robot.setVisible(false);
                    robot.body.enable = false;
                    this.destroyEffect(bx, by, C.orange, bf, sf);
                    SFX.destroy(bf);
                    this.time.delayedCall(bf ? 100 : 50, () => { if (robot.active) robot.destroy(); });
                }
            } else {
                // Boss/admin — partial damage, flash orange tint, allow re-stomp after delay
                robot.setTint(0xff7700);
                this.time.delayedCall(120, () => { if (robot.active) robot.clearTint(); });
                this.time.delayedCall(400, () => { if (robot.active) robot._stomped = false; });
            }

            this.cameras.main.shake(80, 0.008);
            this.player.setVelocityY(-300);
            this.animState = 'jump';
            this.player.anims.play(this.hero.id + '_jump', true);
            return;
        }

        // ── SIDE COLLISION: union damage ──────────────────────────────────
        const dmg = (robot.isPrime || robot.isBoss) ? 10 : robot.isAdmin ? 6 : robot.isShielded ? 5 : 3;
        this.unionPct -= dmg;
        this.resetCombo();
        SFX.hurt();
        this.cameras.main.shake(110, 0.012);
        this.showPopup(player.x, player.y - 30, '-' + dmg + '%', C.crimsonS);
        robot.destroy();
        if (this.unionPct <= 0) {
            this.gameOver = true;
            this.time.delayedCall(250, () => this.showGameOver());
        }
    }

    // ── OVERLAYS ─────────────────────────────────────────────────────────────
    showWaveCleared() {
        const bonus = Math.floor(this.unionPct / 10) * 50;
        this.score += bonus;
        SFX.waveClear();
        saveHS(this.score);

        // Wave 10 victory path (Chronos Prime killed by special power, not strike)
        if (this.wave === 10) {
            if (this.primeHPBg) { this.primeHPBg.destroy(); this.primeHPBg = null; }
            if (this.primeHPFg) { this.primeHPFg.destroy(); this.primeHPFg = null; }
            if (this.primeHPLbl) { this.primeHPLbl.destroy(); this.primeHPLbl = null; }
            this.cameras.main.shake(400, 0.02);
            this.time.delayedCall(1000, () => {
                this.scene.start('StoryScene', { beatIndex: 2, heroId: this.hero.id, wave: this.wave, score: this.score });
            });
            return;
        }

        const nextWave = this.wave + 1;

        this.add.rectangle(W / 2, H / 2, 460, 230, C.dark, 0.93).setDepth(20).setStrokeStyle(1, C.gold);
        this.add.text(W / 2, H / 2 - 82, '— WAVE CLEARED —',    { fontSize: '26px', fill: C.goldS, fontStyle: 'bold' }).setOrigin(0.5).setDepth(21);
        this.add.text(W / 2, H / 2 - 36, 'Score: ' + this.score, { fontSize: '20px', fill: C.creamS }).setOrigin(0.5).setDepth(21);
        this.add.text(W / 2, H / 2 + 4,  'Morale Bonus: +' + bonus, { fontSize: '14px', fill: C.tealS }).setOrigin(0.5).setDepth(21);

        const nextLabel = (nextWave === 4) ? 'TAP  or  SPACE → The Storming of City Hall...'
                        : (nextWave === 7) ? 'TAP  or  SPACE → Into the Rotunda...'
                        : 'TAP  or  SPACE → Next Wave';
        this.add.text(W / 2, H / 2 + 74, nextLabel, { fontSize: '13px', fill: C.goldS }).setOrigin(0.5).setDepth(21);

        let advanced = false;
        const advance = () => {
            if (advanced) return;
            advanced = true;
            this.input.keyboard.off('keydown-SPACE', advance);
            this.input.off('pointerdown', advance);
            // Always resume physics before leaving so the next scene starts unpaused
            if (this.gamePaused) this.physics.resume();
            if (nextWave === 4) {
                this.scene.start('StoryScene', { beatIndex: 0, heroId: this.hero.id, wave: nextWave, score: this.score });
            } else if (nextWave === 7) {
                this.scene.start('StoryScene', { beatIndex: 1, heroId: this.hero.id, wave: nextWave, score: this.score });
            } else {
                this.scene.start('HeroSelectScene', { wave: nextWave, score: this.score });
            }
        };
        this.input.keyboard.once('keydown-SPACE', advance);
        this.input.once('pointerdown', advance);
    }

    showGameOver() {
        SFX.gameOver();
        const prevBest = getHS();
        const isNewHS  = this.score > prevBest;
        saveHS(this.score);
        const displayHS = isNewHS ? this.score : prevBest;
        this.add.rectangle(W / 2, H / 2, 460, 270, C.dark, 0.94).setDepth(20).setStrokeStyle(1, C.crimson);
        this.add.text(W / 2, H / 2 - 95, '— UNION BROKEN —',          { fontSize: '26px', fill: C.crimsonS, fontStyle: 'bold' }).setOrigin(0.5).setDepth(21);
        this.add.text(W / 2, H / 2 - 48, 'Fell on Wave ' + this.wave,  { fontSize: '18px', fill: C.creamS }).setOrigin(0.5).setDepth(21);
        this.add.text(W / 2, H / 2 + 0,  'Final Score: ' + this.score, { fontSize: '22px', fill: C.goldS, fontStyle: 'bold' }).setOrigin(0.5).setDepth(21);
        this.add.text(W / 2, H / 2 + 32, isNewHS ? '★  NEW BEST  ★' : 'Best: ' + displayHS, { fontSize: '13px', fill: isNewHS ? C.goldS : C.tealS }).setOrigin(0.5).setDepth(21);
        this.add.text(W / 2, H / 2 + 90, 'TAP  or  R → Hero Select',   { fontSize: '13px', fill: C.goldS }).setOrigin(0.5).setDepth(21);
        let restarted = false;
        const restart = () => {
            if (restarted) return;
            restarted = true;
            if (this.gamePaused) this.physics.resume();
            this.scene.start('HeroSelectScene', { wave: 1, score: 0 });
        };
        this.input.once('pointerdown', restart);
        this.input.keyboard.once('keydown-R', restart);
    }

    // ── TOUCH CONTROLS ───────────────────────────────────────────────────────
    createTouchButtons() {
        const scaleFactor = this.scale.displayScale.x;
        // Aim for ~44px physical touch target; clamp to minimum 24 game units to avoid overlap
        const r = Math.max(24, Math.round(44 / (2 * scaleFactor)));
        const y = H - 38;
        const makeBtn = (x, label, onDown, onUp) => {
            const g = this.add.graphics().setDepth(50).setScrollFactor(0);
            const txt = this.add.text(x, y, label, { fontSize: '20px', fill: '#ffffff', fontStyle: 'bold' })
                .setOrigin(0.5).setDepth(51).setScrollFactor(0);
            const zone = this.add.zone(x, y, r * 2, r * 2).setInteractive().setDepth(52).setScrollFactor(0);
            const draw = (on) => {
                g.clear();
                g.fillStyle(C.dark, on ? 0.72 : 0.38);
                g.lineStyle(2, C.gold, on ? 0.9 : 0.5);
                g.fillCircle(x, y, r);
                g.strokeCircle(x, y, r);
            };
            draw(false);
            zone.on('pointerdown',   () => { draw(true);  onDown(); });
            zone.on('pointerup',     () => { draw(false); onUp();   });
            zone.on('pointerout',    () => { draw(false); onUp();   });
            zone.on('pointercancel', () => { draw(false); onUp();   });
            return txt;
        };
        makeBtn(65,  '←', () => { this.touch.left  = true;  }, () => { this.touch.left  = false; });
        makeBtn(156, '→', () => { this.touch.right = true;  }, () => { this.touch.right = false; });
        makeBtn(754, '↑', () => { this.touch.up    = true;  }, () => { this.touch.up    = false; });
        makeBtn(842, '⚡', () => { this.touch.strikeFired = true; }, () => {});
        this.touchPowerLabel = makeBtn(912, '★', () => { this.touch.powerFired = true; }, () => {});
    }

    // ── CITY HALL BACKGROUND ─────────────────────────────────────────────────
    drawCityHallBG() {
        const g = this.add.graphics();

        // Base fill
        g.fillStyle(0x080616, 1);
        g.fillRect(0, 0, W, H);

        // Columns
        for (let c = 0; c < 6; c++) {
            const colX = c * 160 - 20;
            g.fillStyle(0x1c1840, 1);
            g.fillRect(colX, 60, 28, GROUND_Y - 60);
            g.fillStyle(0x2a2558, 1);
            g.fillRect(colX - 8, 58, 44, 20);
            g.fillRect(colX - 8, GROUND_Y - 20, 44, 20);
        }

        // Dome arc at top
        g.lineStyle(2, C.teal, 0.2);
        g.beginPath();
        g.arc(W / 2, -10, 300, 0, Math.PI, false);
        g.strokePath();
        g.lineStyle(1, C.teal, 0.1);
        g.beginPath();
        g.arc(W / 2, -10, 260, 0, Math.PI, false);
        g.strokePath();

        // Central eye motif in dome
        g.lineStyle(1, C.gold, 0.18);
        g.strokeCircle(W / 2, 110, 65);
        g.strokeCircle(W / 2, 110, 32);
        g.fillStyle(C.gold, 0.06);
        g.fillCircle(W / 2, 110, 16);
        // Sunburst rays
        for (let i = 0; i < 16; i++) {
            const a = (i / 16) * Math.PI * 2;
            g.lineStyle(1, C.gold, 0.07);
            g.lineBetween(W / 2, 110, W / 2 + Math.cos(a) * 90, 110 + Math.sin(a) * 90);
        }
        // Eye lids
        g.lineStyle(2, C.gold, 0.25);
        g.beginPath();
        g.arc(W / 2, 132, 44, 3.66, 5.76, false);
        g.strokePath();
        g.beginPath();
        g.arc(W / 2, 88, 44, 0.52, 2.62, false);
        g.strokePath();

        // Floor tiles with eye motif
        for (let tx = 0; tx < W; tx += 60) {
            for (let ty = GROUND_Y - 10; ty < H; ty += 42) {
                g.lineStyle(1, C.teal, 0.07);
                g.strokeRect(tx, ty, 60, 42);
                g.fillStyle(C.teal, 0.03);
                g.fillCircle(tx + 30, ty + 21, 9);
                g.lineStyle(1, C.teal, 0.04);
                g.strokeCircle(tx + 30, ty + 21, 5);
            }
        }
    }
}

// ─── PHASER 3.60 FRAME DATA PATCHES ──────────────────────────────────────────
// Fixes "Cannot read properties of null (reading 'cut')" crash.
//
// Root cause (confirmed via call stack):
//   setText → updateText → setSize → this.data.cut   (Frame.data is null)
//
// Two-layer fix so the Phaser minifier's cached internal references can't bypass it:
//   Layer 1 — patch Frame.prototype.setSize (works when called via prototype chain)
//   Layer 2 — patch Text.prototype.updateText to pre-init frame.data before
//             setSize is reached (works even if setSize is called via cached ref)

const _dataInit = () => ({
    cut:              { x: 0, y: 0, w: 0, h: 0, r: 0, b: 0 },
    trim:             false,
    sourceSize:       { w: 0, h: 0 },
    spriteSourceSize: { w: 0, h: 0 },
    radius:           0,
    drawImage:        { x: 0, y: 0, width: 0, height: 0 }
});

// Layer 1: Frame.prototype.setSize
(function patchFrameSetSize() {
    const _orig = Phaser.Textures.Frame.prototype.setSize;
    if (!_orig) return;
    Phaser.Textures.Frame.prototype.setSize = function(width, height, x, y) {
        if (!this.data) { this.data = _dataInit(); }
        return _orig.call(this, width, height, x, y);
    };
})();

// Layer 2: Text.prototype.updateText — fires before Frame.setSize is reached
// inside updateText, so it catches cached-ref paths the Layer 1 patch misses.
(function patchTextUpdateText() {
    const proto = Phaser.GameObjects.Text && Phaser.GameObjects.Text.prototype;
    if (!proto || !proto.updateText) return;
    const _orig = proto.updateText;
    proto.updateText = function() {
        // Pre-initialize any frame whose data is null before rendering runs
        if (this.texture && this.texture.frames) {
            for (const k in this.texture.frames) {
                const f = this.texture.frames[k];
                if (f && !f.data) { f.data = _dataInit(); }
            }
        }
        return _orig.call(this);
    };
})();

// ─── NULL-FRAME SAFETY PATCH ─────────────────────────────────────────────────
// Secondary guard: if Texture.prototype.get() returns null, fall back to any
// available frame rather than propagating null downstream.
(function patchPhaserNullFrame() {
    const _origGet = Phaser.Textures.Texture.prototype.get;
    Phaser.Textures.Texture.prototype.get = function(name) {
        const frame = _origGet.call(this, name);
        if (frame === null) {
            console.error('[DogStrike] NULL TextureFrame: texture="' + this.key +
                '" name=' + JSON.stringify(name) +
                ' firstFrame=' + JSON.stringify(this.firstFrame) +
                ' frameKeys=' + Object.keys(this.frames).join(','));
            // Emergency fallback: return any existing frame rather than null
            const fallbackKey = this.firstFrame || Object.keys(this.frames)[0];
            if (fallbackKey !== undefined && this.frames[fallbackKey]) {
                return this.frames[fallbackKey];
            }
        }
        return frame;
    };
})();

// ─── CONFIG ──────────────────────────────────────────────────────────────────
const config = {
    type: Phaser.AUTO,
    width: W,
    height: H,
    parent: 'game-container',
    backgroundColor: '#1a0f1a',
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        expandParent: false,
    },
    input: {
        activePointers: 5,
    },
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 520 }, debug: false }
    },
    scene: [BootScene, TitleScene, HeroSelectScene, StoryScene, PlayScene]
};

const game = new Phaser.Game(config);

// ── LOADING SCREEN DOTS ANIMATION ────────────────────────────────────────────
(function() {
    let dotCount = 0;
    const dots = document.getElementById('loading-dots');
    if (!dots) return;
    const iv = setInterval(() => {
        dotCount = (dotCount + 1) % 4;
        dots.textContent = '.'.repeat(dotCount);
    }, 400);
    window._loadingDotsInterval = iv;
})();

// ── MUTE BUTTON ──────────────────────────────────────────────────────────────
(function() {
    const btn = document.getElementById('mute-btn');
    if (!btn) return;
    const sync = () => { btn.textContent = SFX.muted ? '🔇' : '🔊'; };
    sync();
    btn.addEventListener('click', () => { SFX.toggleMute(); sync(); });
})();

// ── ORIENTATION GUARD ────────────────────────────────────────────────────────
(function() {
    const updateOrientation = () => {
        const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        const isPortrait = window.innerHeight > window.innerWidth;
        const prompt = document.getElementById('rotate-prompt');
        const container = document.getElementById('game-container');
        if (!prompt) return;
        if (isTouch && isPortrait) {
            prompt.style.display = 'flex';
            if (container) container.style.visibility = 'hidden';
        } else {
            prompt.style.display = '';
            if (container) container.style.visibility = '';
        }
    };
    window.addEventListener('orientationchange', updateOrientation);
    window.addEventListener('resize', updateOrientation);
    updateOrientation();
})();
</script>
</body>
</html>
