<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
    <meta name="mobile-web-app-capable" content="yes">
    <title>DogStrike: Union Strong</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            height: 100%;
            overflow: hidden;
        }
        body {
            background-color: #1a0f1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;    /* fallback for older iOS */
            height: 100dvh;   /* dynamic viewport height — shrinks when browser chrome appears */
            overflow: hidden;
            touch-action: none;
            font-family: 'Courier New', Courier, monospace;
            /* Safe area for iPhone notch + home indicator */
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        #game-container {
            border: 3px solid #d4af37;
            box-shadow: 0 0 40px rgba(212,175,55,0.3), 0 0 80px rgba(0,0,0,0.8);
        }
        /* Touch screens: fill entire viewport, no decorative border */
        @media (hover: none) and (pointer: coarse) {
            #game-container {
                border: none;
                box-shadow: none;
                width: 100%;
                height: 100%;
            }
        }
        #controls-hint {
            margin-top: 12px;
            color: #8a6f3a;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        @media (hover: none) and (pointer: coarse) {
            #controls-hint { display: none; }
        }

        /* Rotation prompt — hidden by default, shown on portrait phones */
        #rotate-prompt {
            display: none;
            position: fixed;
            inset: 0;
            background: #1a0f1a;
            color: #d4af37;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        #rotate-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            font-size: 14px;
            border: 1px solid #d4af37;
            padding: 32px 48px;
        }
        #rotate-inner::before {
            content: '↺';
            font-size: 48px;
            display: block;
        }
        @media (pointer: coarse) and (orientation: portrait) and (max-width: 767px) {
            #rotate-prompt  { display: flex; }
            #game-container { visibility: hidden; }
            #controls-hint  { display: none; }
        }

        /* ── Loading splash screen ── */
        #loading-screen {
            position: fixed; inset: 0;
            background: #1a0f1a;
            display: flex; align-items: center; justify-content: center;
            z-index: 2000;
            transition: opacity 0.5s ease;
            font-family: 'Courier New', Courier, monospace;
        }
        #loading-screen.fade-out { opacity: 0; pointer-events: none; }
        #loading-inner {
            display: flex; flex-direction: column; align-items: center; gap: 14px;
            border: 2px solid #d4af37;
            padding: 40px 60px;
            text-align: center;
            color: #d4af37;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        #loading-title { font-size: 36px; font-weight: bold; }
        #loading-sub   { font-size: 11px; color: #f4e4bc; letter-spacing: 6px; }
        #loading-bar-wrap {
            width: 200px; height: 6px;
            background: #2e1a2d;
            border: 1px solid #d4af37;
            border-radius: 3px;
            overflow: hidden;
        }
        #loading-bar {
            width: 0%; height: 100%;
            background: #d4af37;
            transition: width 0.15s ease;
        }
        #loading-text { font-size: 12px; letter-spacing: 3px; }

        /* ── Mute button ── */
        #mute-btn {
            position: fixed;
            top: 10px; right: 10px;
            z-index: 500;
            background: rgba(26,15,26,0.85);
            border: 1px solid #d4af37;
            color: #d4af37;
            font-size: 16px;
            width: 34px; height: 34px;
            cursor: pointer;
            border-radius: 3px;
            display: flex; align-items: center; justify-content: center;
            padding: 0;
            line-height: 1;
            -webkit-tap-highlight-color: transparent;
        }
        #mute-btn:active { background: rgba(46,26,45,0.95); }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <div id="rotate-prompt">
        <div id="rotate-inner"><span>Rotate to landscape</span></div>
    </div>
    <div id="controls-hint">← → Move &nbsp;|&nbsp; ↑ Jump &nbsp;|&nbsp; SPACE Strike &nbsp;|&nbsp; X Special Power &nbsp;|&nbsp; R Restart</div>
    <div id="loading-screen">
        <div id="loading-inner">
            <div id="loading-title">DOGSTRIKE</div>
            <div id="loading-sub">UNION STRONG</div>
            <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
            <div id="loading-text">LOADING<span id="loading-dots"></span></div>
        </div>
    </div>

<script>
/**
 * DOGSTRIKE: UNION STRONG
 * 1930s Art Deco | Canine Union vs. Industrial Robots
 */

const W = 960;
const H = 540;
const GROUND_Y = 468;

const C = {
    gold:    0xd4af37,  goldS:    '#d4af37',
    teal:    0x2a9d8f,  tealS:    '#2a9d8f',
    orange:  0xe76f51,  orangeS:  '#e76f51',
    crimson: 0xc1121f,  crimsonS: '#c1121f',
    cream:   0xf4e4bc,  creamS:   '#f4e4bc',
    plum:    0x2e1a2d,
    dark:    0x0d0810,
};

// ─── PROCEDURAL SFX ──────────────────────────────────────────────────────────
const SFX = (() => {
    let _ctx = null;
    let _muted = localStorage.getItem('dogstrike_mute') === '1';
    const ctx = () => {
        if (_muted) return null;
        if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (_ctx.state === 'suspended') _ctx.resume();
        return _ctx;
    };
    const osc = (freq, type, vol, dur, freqEnd) => {
        const c = ctx(); if (!c) return;
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type = type; o.frequency.setValueAtTime(freq, c.currentTime);
        if (freqEnd !== undefined) o.frequency.exponentialRampToValueAtTime(freqEnd, c.currentTime + dur);
        g.gain.setValueAtTime(vol, c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
        o.start(); o.stop(c.currentTime + dur);
    };
    const burst = (vol, dur, cutoff) => {
        const c = ctx(); if (!c) return;
        const buf = c.createBuffer(1, Math.ceil(c.sampleRate * dur), c.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        const src = c.createBufferSource(), flt = c.createBiquadFilter(), g = c.createGain();
        src.buffer = buf; flt.type = 'lowpass'; flt.frequency.value = cutoff || 1000;
        src.connect(flt); flt.connect(g); g.connect(c.destination);
        g.gain.setValueAtTime(vol, c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
        src.start();
    };
    return {
        strike()  { osc(240, 'square',   0.35, 0.09, 80);  burst(0.18, 0.1,  500); },
        miss()    { osc(180, 'sine',     0.18, 0.14, 110); },
        shield()  { osc(900, 'square',   0.18, 0.06, 1400); },
        hit()     { burst(0.28, 0.12, 700); osc(110, 'square', 0.26, 0.11, 55); },
        hurt()    { osc(190, 'square',   0.32, 0.16, 75);  burst(0.22, 0.16, 600); },
        destroy(boss) {
            burst(boss ? 0.50 : 0.38, boss ? 0.38 : 0.22, boss ? 280 : 700);
            osc(boss ? 75 : 130, 'sawtooth', 0.38, boss ? 0.32 : 0.18, boss ? 28 : 55);
        },
        jump()  { osc(320, 'sine', 0.14, 0.14, 540); },
        land()  { burst(0.14, 0.07, 600); },
        power(id) {
            if (id === 'saint') {
                [0,80,160,240,320].forEach((t,i) => setTimeout(() => osc(220+i*70,'sine',0.26,0.22), t));
                burst(0.2, 0.45, 1400);
            } else if (id === 'shepherd') {
                osc(280, 'sawtooth', 0.32, 0.32, 75); burst(0.24, 0.3, 1000);
            } else {
                [0,55,110,165].forEach((t,i) => setTimeout(() => osc(820-i*110,'square',0.16,0.11), t));
            }
        },
        waveClear() { [261,329,392,523].forEach((n,i) => setTimeout(() => osc(n,'sine',0.28,0.32), i*110)); },
        gameOver()  { [392,330,261,196].forEach((n,i) => setTimeout(() => osc(n,'sawtooth',0.24,0.36), i*170)); },
        stomp()     { burst(0.32, 0.11, 400); osc(95, 'sawtooth', 0.28, 0.14, 38); },
        drone()     { osc(700, 'sawtooth', 0.20, 0.07, 130); osc(1150, 'square', 0.08, 0.05, 480); },
        get muted() { return _muted; },
        toggleMute() {
            _muted = !_muted;
            localStorage.setItem('dogstrike_mute', _muted ? '1' : '0');
            if (_ctx) { _muted ? _ctx.suspend() : _ctx.resume(); }
        },
    };
})();

// ─── HIGH SCORE ───────────────────────────────────────────────────────────────
const HS_KEY = 'dogstrike_hs';
function getHS()   { return parseInt(localStorage.getItem(HS_KEY) || '0', 10); }
function saveHS(s) { if (s > getHS()) localStorage.setItem(HS_KEY, String(s)); }

// ─── HERO DEFINITIONS ────────────────────────────────────────────────────────
const HEROES = {
    saint: {
        id: 'saint', name: 'St. Bernard', role: 'Union Leader',
        spriteKey: 'hero_saint', cardKey: 'hero_saint_card', sheetKey: 'hero_saint_sheet', color: 0xe8c45a, colorS: '#e8c45a',
        speed: 180, strikeRange: 120, strikeCD: 25,
        powerName: 'UNITY HOWL',
        powerDesc: 'Full-screen shockwave — clears all active robots',
        powerCD: 360, powerColor: C.gold,
    },
    shepherd: {
        id: 'shepherd', name: 'German Shepherd', role: 'Field Commander',
        spriteKey: 'hero_shepherd', cardKey: 'hero_shepherd_card', sheetKey: 'hero_shepherd_sheet', color: 0x8b9e6c, colorS: '#8b9e6c',
        speed: 200, strikeRange: 95, strikeCD: 20,
        powerName: 'AUTHORITY BARK',
        powerDesc: 'Directional shockwave — flings all robots off-screen',
        powerCD: 300, powerColor: C.teal,
    },
    dachshund: {
        id: 'dachshund', name: 'Dachshund', role: 'Tech Saboteur',
        spriteKey: 'hero_dachshund', cardKey: 'hero_dachshund_card', sheetKey: 'hero_dachshund_sheet', color: 0xc1440e, colorS: '#c1440e',
        speed: 220, strikeRange: 80, strikeCD: 18,
        powerName: 'TECH SABOTAGE',
        powerDesc: 'Breaks shields — destroys all shielded & heavy robots',
        powerCD: 280, powerColor: C.teal,
    },
};

// ─── SHARED HELPERS (mixin-style, bound to scene in use) ─────────────────────
function drawDecoBorder(scene) {
    const g = scene.add.graphics().setDepth(5);
    g.lineStyle(1, C.gold, 0.3);
    g.strokeRect(8, 8, W - 16, H - 16);
    g.lineStyle(1, C.gold, 0.12);
    g.strokeRect(13, 13, W - 26, H - 26);
    const dia = (x, y, r) => {
        g.lineStyle(1, C.gold, 0.5);
        g.beginPath();
        g.moveTo(x, y - r); g.lineTo(x + r, y); g.lineTo(x, y + r); g.lineTo(x - r, y);
        g.closePath(); g.strokePath();
    };
    [16, W - 16].forEach(x => [16, H - 16].forEach(y => dia(x, y, 8)));
}

function drawDecoEyeStatic(scene, x, y, color, alpha) {
    const a = alpha || 0.7;
    const g = scene.add.graphics();
    g.lineStyle(2, color, a);
    // Upper lid: arc center below eye center, clockwise from left to right through top
    g.beginPath();
    g.arc(x, y + 14, 28, 3.66, 5.77, false);
    g.strokePath();
    // Lower lid: arc center above eye center, clockwise from right to left through bottom
    g.beginPath();
    g.arc(x, y - 14, 28, 0.52, 2.62, false);
    g.strokePath();
    g.strokeCircle(x, y, 7);
    g.fillStyle(color, a * 0.6);
    g.fillCircle(x, y, 3);
}

// ─── HERO FRAME ANIMATION GENERATION ─────────────────────────────────────────
// Procedurally generates 8-frame spritesheets per hero via Canvas 2D.
// Frame map:  0-1 = idle (breathing)  |  2-5 = walk cycle  |  6 = jump  |  7 = strike
// Canvas size: 64px × 80px per frame, 8 frames wide (512 × 80 total per hero).

function _rrPath(ctx, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
}

function _dogPose(f) {
    // bodyLean: body rotation (radians)  bLX/fLX: back/front leg center X offset from cx
    // bRot/fRot: leg rotation  headY: vertical head offset  strike: extend punch arm
    // tailAng: tail arc angle (swings with gait)
    const p = [
        { bodyLean: 0,     bLX: -5,  fLX:  5, headY:  0, bRot:  0,    fRot:  0    }, // 0 idle A
        { bodyLean: 0,     bLX: -5,  fLX:  5, headY: -1, bRot:  0,    fRot:  0    }, // 1 idle B
        { bodyLean:  0.12, bLX:-10,  fLX: 12, headY:  2, bRot:-0.42,  fRot: 0.36, tailAng:-0.25 }, // 2 run A — left diagonal
        { bodyLean:  0.02, bLX: -3,  fLX:  3, headY: -1, bRot:-0.10,  fRot: 0.08, tailAng: 0.08 }, // 3 run B — gather
        { bodyLean: -0.12, bLX: 10,  fLX:-12, headY:  2, bRot: 0.36,  fRot:-0.42, tailAng: 0.25 }, // 4 run C — right diagonal
        { bodyLean: -0.02, bLX: -3,  fLX:  3, headY: -1, bRot: 0.08,  fRot:-0.10, tailAng:-0.08 }, // 5 run D — gather
        { bodyLean:  0,    bLX: -4,  fLX:  4, headY: -5, bRot:-0.60,  fRot:-0.60, tailAng: 0.35 }, // 6 jump — aerial tuck
        { bodyLean:-0.18,  bLX: -8,  fLX: 12, headY:  0, bRot:-0.1,   fRot:  0.15, strike: true  }, // 7 strike
        { bodyLean:-0.08,  bLX: -6,  fLX:  6, headY: -4, bRot: 0.12,  fRot: 0.12, tailAng:-0.35 }, // 8 special A — windup
        { bodyLean:-0.22,  bLX:-10,  fLX: 14, headY: -2, bRot: 0.15,  fRot:-0.20, tailAng:-0.45, strike: true }, // 9 special B — peak
        { bodyLean: 0.05,  bLX: -5,  fLX:  5, headY:  1, bRot:-0.10,  fRot:-0.10, tailAng: 0.10 }, // 10 special C — release
    ];
    return p[Math.min(f, p.length - 1)];
}

function _drawEars(ctx, hx, hy, cfg) {
    ctx.fillStyle = cfg.pc;
    if (cfg.ears === 'floppy') {
        ctx.save(); ctx.translate(hx - cfg.hRx * 0.68, hy);
        ctx.beginPath(); ctx.ellipse(0, 7, 5, 11, -0.25, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        ctx.save(); ctx.translate(hx + cfg.hRx * 0.68, hy);
        ctx.beginPath(); ctx.ellipse(0, 7, 5, 11,  0.25, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    } else if (cfg.ears === 'pointed') {
        ctx.beginPath();
        ctx.moveTo(hx - cfg.hRx * 0.5, hy - 4); ctx.lineTo(hx - cfg.hRx * 0.85, hy - 19);
        ctx.lineTo(hx - cfg.hRx * 0.18, hy - 6); ctx.closePath(); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(hx + cfg.hRx * 0.5, hy - 4); ctx.lineTo(hx + cfg.hRx * 0.85, hy - 19);
        ctx.lineTo(hx + cfg.hRx * 0.18, hy - 6); ctx.closePath(); ctx.fill();
    } else if (cfg.ears === 'floppy_low') {
        ctx.save(); ctx.translate(hx - cfg.hRx * 0.6, hy + 3);
        ctx.beginPath(); ctx.ellipse(0, 9, 5, 13, -0.4, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        ctx.save(); ctx.translate(hx + cfg.hRx * 0.6, hy + 3);
        ctx.beginPath(); ctx.ellipse(0, 9, 5, 13,  0.4, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    }
}

function _drawHat(ctx, hx, hy, hRy, cfg) {
    const hTop = hy - hRy;
    if (cfg.hat === 'cap') {
        // Flat union organizer cap with brim and gold band
        ctx.beginPath(); ctx.ellipse(hx + 3, hTop + 5, hRy + 4, 4, 0, 0, Math.PI * 2);
        ctx.fillStyle = cfg.hatC; ctx.fill();
        _rrPath(ctx, hx - hRy + 1, hTop - hRy + 2, (hRy - 1) * 2, hRy + 4, 3);
        ctx.fillStyle = cfg.hatC; ctx.fill();
        _rrPath(ctx, hx - hRy + 1, hTop + 1, (hRy - 1) * 2, 4, 2);
        ctx.fillStyle = cfg.hatA; ctx.fill();
    } else if (cfg.hat === 'beret') {
        // Military beret tilted right, with badge dot
        ctx.save(); ctx.translate(hx + 2, hTop + 2); ctx.rotate(-0.18);
        ctx.beginPath(); ctx.ellipse(1, 0, hRy + 2, 5, 0, 0, Math.PI * 2);
        ctx.fillStyle = cfg.hatC; ctx.fill();
        ctx.beginPath(); ctx.ellipse(-1, -4, hRy - 2, 6, 0, 0, Math.PI * 2);
        ctx.fillStyle = cfg.hatC; ctx.fill();
        ctx.beginPath(); ctx.arc(5, -6, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = cfg.hatA; ctx.fill();
        ctx.restore();
    } else if (cfg.hat === 'helmet') {
        // Miner's hard hat with front lamp
        ctx.beginPath(); ctx.ellipse(hx, hTop + 4, hRy + 5, 4, 0, 0, Math.PI * 2);
        ctx.fillStyle = cfg.hatC; ctx.fill();
        ctx.beginPath(); ctx.ellipse(hx, hTop + 1, hRy + 3, hRy + 1, 0, Math.PI, 0, false);
        ctx.fillStyle = cfg.hatC; ctx.fill();
        ctx.save(); ctx.translate(hx + hRy * 0.72, hTop - 1); ctx.rotate(-0.3);
        ctx.beginPath(); ctx.ellipse(0, 0, 4, 3, 0, 0, Math.PI * 2);
        ctx.fillStyle = cfg.hatA; ctx.fill();
        ctx.restore();
    }
}

function _drawDogFrame(ctx, ox, oy, fw, fh, cfg, frameIdx) {
    const cx   = ox + fw / 2;
    const FOOT = oy + fh - 4;
    const pose = _dogPose(frameIdx);

    const LH = cfg.lH, LW = cfg.lW, BH = cfg.bH, BW = cfg.bW;
    const legTopY  = FOOT - LH;
    const bodyBotY = legTopY;
    const bodyTopY = bodyBotY - BH + pose.headY * 0.3;
    const headCY   = bodyTopY - cfg.hRy - 2 + pose.headY;

    // Back leg (darker color, drawn behind body)
    ctx.save(); ctx.translate(cx + pose.bLX, legTopY); ctx.rotate(pose.bRot);
    _rrPath(ctx, -LW/2, 0, LW, LH, 3); ctx.fillStyle = cfg.dc; ctx.fill();
    ctx.beginPath(); ctx.ellipse(0, LH, LW * 0.75, 3.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = cfg.dc; ctx.fill(); ctx.restore();

    // Tail (quadratic curve off the back of the body, angle driven by pose.tailAng)
    ctx.save(); ctx.strokeStyle = cfg.pc; ctx.lineWidth = 4; ctx.lineCap = 'round';
    const tRootX = cx + BW * 0.42;
    const tRootY = bodyTopY + BH * 0.35;
    const tAng   = pose.tailAng || 0;
    ctx.beginPath();
    ctx.moveTo(tRootX, tRootY);
    ctx.quadraticCurveTo(
        tRootX + Math.sin(tAng) * 11, tRootY - 14,
        tRootX + Math.sin(tAng) * 7 + 7, tRootY - 26
    );
    ctx.stroke(); ctx.restore();

    // Body
    ctx.save(); ctx.translate(cx, bodyTopY + BH / 2); ctx.rotate(pose.bodyLean);
    _rrPath(ctx, -BW/2, -BH/2, BW, BH, 5); ctx.fillStyle = cfg.pc; ctx.fill();
    _rrPath(ctx, -BW/2 + 4, BH/2 - 7, BW - 8, 5, 2); ctx.fillStyle = cfg.ac; ctx.fill();
    ctx.restore();

    // Strike arm (frame 7): extended arm with punch paw
    if (pose.strike) {
        ctx.save(); ctx.translate(cx - BW * 0.2 - 4, bodyTopY + BH * 0.32); ctx.rotate(-0.15);
        _rrPath(ctx, 0, -4, 16, 7, 3); ctx.fillStyle = cfg.pc; ctx.fill();
        ctx.beginPath(); ctx.ellipse(21, 0, 7, 5.5, 0, 0, Math.PI * 2);
        ctx.fillStyle = cfg.pc; ctx.fill();
        ctx.fillStyle = cfg.dc;
        for (let k = 0; k < 3; k++) {
            ctx.beginPath(); ctx.arc(16 + k * 3, -1, 1.2, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
    }

    // Front leg (primary color, drawn in front of body)
    ctx.save(); ctx.translate(cx + pose.fLX, legTopY); ctx.rotate(pose.fRot);
    _rrPath(ctx, -LW/2, 0, LW, LH, 3); ctx.fillStyle = cfg.pc; ctx.fill();
    ctx.beginPath(); ctx.ellipse(0, LH, LW * 0.75, 3.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = cfg.pc; ctx.fill(); ctx.restore();

    // Ears (behind head)
    _drawEars(ctx, cx, headCY, cfg);

    // Head
    ctx.beginPath(); ctx.ellipse(cx, headCY, cfg.hRx, cfg.hRy, 0, 0, Math.PI * 2);
    ctx.fillStyle = cfg.pc; ctx.fill();

    // Snout
    ctx.save(); ctx.translate(cx + cfg.hRx - 3, headCY + 3);
    ctx.beginPath(); ctx.ellipse(cfg.sL / 2, 0, cfg.sL / 2 + 2, cfg.sH / 2 + 1, 0, 0, Math.PI * 2);
    ctx.fillStyle = cfg.ac; ctx.fill();
    ctx.beginPath(); ctx.ellipse(cfg.sL + 1, -1, 3, 2, 0, 0, Math.PI * 2);
    ctx.fillStyle = cfg.dc; ctx.fill(); ctx.restore();

    // Eye + shine
    const eX = cx + cfg.hRx * 0.22, eY = headCY - 2;
    ctx.beginPath(); ctx.arc(eX, eY, 2.5, 0, Math.PI * 2); ctx.fillStyle = '#0d0810'; ctx.fill();
    ctx.beginPath(); ctx.arc(eX + 1, eY - 1, 0.9, 0, Math.PI * 2); ctx.fillStyle = '#ffffff'; ctx.fill();

    // Hat
    _drawHat(ctx, cx, headCY, cfg.hRy, cfg);
}

function createHeroSpritesheets(scene) {
    // Frame dimensions match the AI-generated sheets (128×160 per frame, 11 frames).
    // 0-1: idle  2-5: run  6: jump  7: strike  8-10: special
    const FW = 128, FH = 160, NF = 11;
    const CFGS = [
        { id: 'saint',     key: 'hero_saint_sheet',
          pc: '#e8c45a', dc: '#9a6214', ac: '#f5ead0', hatC: '#2a1608', hatA: '#d4af37',
          ears: 'floppy',     hat: 'cap',
          hRx: 22, hRy: 20, sL: 16, sH: 10, bW: 52, bH: 48, lW: 18, lH: 38 },
        { id: 'shepherd',  key: 'hero_shepherd_sheet',
          pc: '#8b9e6c', dc: '#3d4e2c', ac: '#c8a96e', hatC: '#4a3a5a', hatA: '#2a9d8f',
          ears: 'pointed',    hat: 'beret',
          hRx: 20, hRy: 18, sL: 18, sH:  8, bW: 48, bH: 44, lW: 16, lH: 36 },
        { id: 'dachshund', key: 'hero_dachshund_sheet',
          pc: '#c1440e', dc: '#7a2808', ac: '#e8a050', hatC: '#f0a010', hatA: '#ffee44',
          ears: 'floppy_low', hat: 'helmet',
          hRx: 20, hRy: 18, sL: 22, sH:  8, bW: 64, bH: 36, lW: 14, lH: 30 },
    ];
    CFGS.forEach(cfg => {
        if (scene.textures.exists(cfg.key)) scene.textures.remove(cfg.key);
        const cTex = scene.textures.createCanvas(cfg.key, FW * NF, FH);
        const ctx  = cTex.getContext();
        ctx.clearRect(0, 0, FW * NF, FH);
        for (let f = 0; f < NF; f++) _drawDogFrame(ctx, f * FW, 0, FW, FH, cfg, f);
        cTex.refresh();
        for (let f = 0; f < NF; f++) cTex.add(f, 0, f * FW, 0, FW, FH);
    });
}

function createHeroAnimations(scene) {
    [
        { id: 'saint',     key: 'hero_saint_sheet'     },
        { id: 'shepherd',  key: 'hero_shepherd_sheet'  },
        { id: 'dachshund', key: 'hero_dachshund_sheet' },
    ].forEach(({ id, key }) => {
        ['idle', 'walk', 'jump', 'strike', 'special'].forEach(a => {
            if (scene.anims.exists(id + '_' + a)) scene.anims.remove(id + '_' + a);
        });

        // Defensive frame accessor: returns n if it exists in the texture, else 0.
        // Guards against AI PNG sheets with fewer frames than expected.
        const tex = scene.textures.get(key);
        const f = n => tex.has(n) ? n : 0;
        console.log('[DogStrike] ' + key + ' frameTotal=' + tex.frameTotal);

        scene.anims.create({ key: id + '_idle',
            frames: [{ key, frame: f(0) }, { key, frame: f(1) }],
            frameRate: 2, repeat: -1 });
        scene.anims.create({ key: id + '_walk',
            frames: [{ key, frame: f(2) }, { key, frame: f(3) }, { key, frame: f(4) }, { key, frame: f(5) }],
            frameRate: 12, repeat: -1 });
        scene.anims.create({ key: id + '_jump',
            frames: [{ key, frame: f(6) }],
            frameRate: 1, repeat: 0 });
        scene.anims.create({ key: id + '_strike',
            frames: [{ key, frame: f(7) }, { key, frame: f(0) }],
            frameRate: 14, repeat: 0 });
        // Use frames 8-10 for special if available, else reuse jump/strike frames
        scene.anims.create({ key: id + '_special',
            frames: tex.has(8)
                ? [{ key, frame: f(8) }, { key, frame: f(9) }, { key, frame: f(10) }, { key, frame: f(0) }]
                : [{ key, frame: f(6) }, { key, frame: f(7) }, { key, frame: f(0) }],
            frameRate: 8, repeat: 0 });
    });
}

            { key: 'bg_cityhall_c',  path: './assets/background/bg_cityhall_c.png',           w: 800, h: 600, color: 0x1a1010 },

        this.load.on('loaderror', (f) => this.failedKeys.add(f.key));
        this.assetDefs.forEach(d => { if (d.path) this.load.image(d.key, d.path); });

        // Attempt to load AI-generated hero spritesheets (128×160 per frame, 11 frames wide).
        // If these PNGs exist the Canvas 2D fallback is skipped; missing files gracefully fall back.
        [
            { key: 'hero_saint_sheet',     path: './assets/dogs/hero_saint_sheet.png'     },
            { key: 'hero_shepherd_sheet',  path: './assets/dogs/hero_shepherd_sheet.png'  },
            { key: 'hero_dachshund_sheet', path: './assets/dogs/hero_dachshund_sheet.png' },
        ].forEach(s => {
            this.load.spritesheet(s.key, s.path, { frameWidth: 128, frameHeight: 160 });
        });
    }

    makeRect(key, w, h, color) {
        // Use createCanvas instead of generateTexture — guarantees __BASE frame exists
        // (generateTexture in WebGL mode can produce textures without a valid __BASE frame)
        const r = (color >> 16) & 0xff, g = (color >> 8) & 0xff, b = color & 0xff;
        const tex = this.textures.createCanvas(key, w, h);
        const ctx = tex.getContext('2d');
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = `rgba(212,175,55,0.5)`;
        ctx.lineWidth = 2;
        ctx.strokeRect(1, 1, w - 2, h - 2);
        tex.refresh();
    }

    makeDroneTex(key) {
        // 44×30 surveillance drone — dark steel body, teal glow, hostile red camera eye.
        // Camera eye is on the RIGHT side so setFlipX matches direction of travel.
        const tex = this.textures.createCanvas(key, 44, 30);
        const ctx = tex.getContext('2d');

        // ── Rotor arms ────────────────────────────────────────────────
        ctx.strokeStyle = '#243340';  ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(12, 14); ctx.lineTo(7,  8); ctx.stroke();  // left
        ctx.beginPath(); ctx.moveTo(32, 14); ctx.lineTo(37, 8); ctx.stroke();  // right

        // ── Rotor discs ───────────────────────────────────────────────
        [[7, 8], [37, 8]].forEach(([cx, cy]) => {
            ctx.fillStyle = 'rgba(0,210,230,0.15)';  ctx.strokeStyle = 'rgba(0,210,230,0.50)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.ellipse(cx, cy, 6, 2.8, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = 'rgba(0,200,220,0.38)';  ctx.strokeStyle = 'rgba(80,235,245,0.75)';
            ctx.lineWidth = 0.5;
            ctx.beginPath(); ctx.ellipse(cx, cy, 3.5, 1.4, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        });

        // ── Fuselage shadow ───────────────────────────────────────────
        ctx.fillStyle = '#0e1c26';
        ctx.fillRect(8, 15, 28, 9);

        // ── Fuselage body ─────────────────────────────────────────────
        ctx.fillStyle = '#1e3040';
        ctx.fillRect(9, 14, 26, 8);

        // Top highlight strip
        ctx.fillStyle = '#2a4458';
        ctx.fillRect(9, 14, 26, 3);

        // Center tech vent stripe
        ctx.fillStyle = 'rgba(0,185,205,0.48)';
        ctx.fillRect(13, 16, 14, 2);

        // ── Camera eye (hostile red — right side = default front) ─────
        ctx.fillStyle = 'rgba(210,25,0,0.28)';
        ctx.beginPath(); ctx.arc(32, 18, 5, 0, Math.PI * 2); ctx.fill();   // outer glow
        ctx.fillStyle = '#cc1500';
        ctx.beginPath(); ctx.arc(32, 18, 2.5, 0, Math.PI * 2); ctx.fill(); // iris
        ctx.fillStyle = 'rgba(255,175,150,0.72)';
        ctx.beginPath(); ctx.arc(31.2, 17.2, 0.7, 0, Math.PI * 2); ctx.fill(); // glint

        // ── Body outline (teal glow) ───────────────────────────────────
        ctx.strokeStyle = 'rgba(0,190,210,0.55)';  ctx.lineWidth = 1;
        ctx.strokeRect(9.5, 14.5, 25, 7);

        // ── Tail fin ──────────────────────────────────────────────────
        ctx.fillStyle = '#162230';
        ctx.fillRect(18, 22, 8, 5);
        ctx.strokeStyle = 'rgba(0,170,190,0.38)';  ctx.lineWidth = 0.5;
        ctx.strokeRect(18.5, 22.5, 7, 4);

        tex.refresh();
    }

    create() {
        // Dismiss loading overlay
        const ls = document.getElementById('loading-screen');
        if (ls) {
            ls.classList.add('fade-out');
            setTimeout(() => { if (ls.parentNode) ls.parentNode.removeChild(ls); }, 550);
        }
        clearInterval(window._loadingDotsInterval);

        this.assetDefs.forEach(d => {
            if (!d.path || this.failedKeys.has(d.key)) {
                if (!this.textures.exists(d.key)) {
                    if (d.key === 'enemy_drone') this.makeDroneTex(d.key);
                    else this.makeRect(d.key, d.w, d.h, d.color);
                }
            }
        });

        // Use AI-generated sheets if all three loaded; otherwise fall back to Canvas 2D drawing.
        const sheetKeys = ['hero_saint_sheet', 'hero_shepherd_sheet', 'hero_dachshund_sheet'];
        const sheetsLoaded = sheetKeys.every(k => !this.failedKeys.has(k) && this.textures.exists(k));
        if (!sheetsLoaded) {
            console.log('[DogStrike] AI sheets not found — using Canvas 2D fallback sprites');
            createHeroSpritesheets(this);
        } else {
            console.log('[DogStrike] AI-generated hero sheets loaded');
        }
        createHeroAnimations(this);

        // Guard: before every game step, fix any sprite/image with a null frame.
        // The Canvas renderer crashes with "null.cut" when sprite.frame is null.
        // This can happen if an animation stores a null TextureFrame reference,
        // or if a texture's __BASE frame was missing at sprite-creation time.
        this.sys.game.events.on('prestep', () => {
            this.sys.game.scene.scenes.forEach(scene => {
                if (!scene.sys || !scene.sys.isActive() || !scene.children) return;
                scene.children.list.forEach(obj => {
                    if (!obj || !obj.active || !('_frame' in obj) || obj._frame !== null) return;
                    const tex = obj.texture;
                    if (!tex || !tex.frames) return;
                    const key = tex.firstFrame ?? Object.keys(tex.frames)[0];
                    if (key !== undefined && tex.frames[key]) {
                        obj._frame = tex.frames[key];
                        console.warn('[DogStrike] FIXED null _frame — obj:', obj.constructor?.name,
                            'tex:', tex.key, 'fallback frame:', key);
                    }
                });
            });
        });

        this.scene.start('TitleScene');
    }
}

// ─── HERO SELECT SCENE ───────────────────────────────────────────────────────
class HeroSelectScene extends Phaser.Scene {
    constructor() { super('HeroSelectScene'); }

    init(data) {
        this.unlockedWave = data.wave  || 1;
        this.score        = data.score || 0;
        this.unlocked = {
            saint:     true,
            shepherd:  this.unlockedWave >= 4,
            dachshund: this.unlockedWave >= 7,
        };
    }

    create() {
        this.add.rectangle(W / 2, H / 2, W, H, C.dark, 1);
        const hsBgKey = this.unlockedWave >= 7 ? 'bg_cityhall_nd' : 'bg_factory_nh';
        const hsBg = this.add.image(W / 2, H / 2, hsBgKey)
            .setAlpha(0.10).setDisplaySize(W * 1.15, H * 1.15);
        const hsPan = Math.round((W * 0.15) / 2);
        this.tweens.add({ targets: hsBg, x: W / 2 + hsPan,
            duration: 25000, ease: 'Sine.InOut', yoyo: true, repeat: -1 });
        drawDecoBorder(this);

        this.add.text(W / 2, 48, 'DOGSTRIKE', { fontSize: '36px', fill: C.goldS, fontStyle: 'bold', letterSpacing: 8 }).setOrigin(0.5);
        this.add.text(W / 2, 88, '— CHOOSE YOUR UNION LEADER —', { fontSize: '12px', fill: C.goldS, letterSpacing: 4 }).setOrigin(0.5);

        const heroList = [HEROES.saint, HEROES.shepherd, HEROES.dachshund];
        const cardW = 200, cardH = 320, gap = 30;
        const startX = (W - (cardW * 3 + gap * 2)) / 2;

        heroList.forEach((hero, i) => {
            const cx = startX + i * (cardW + gap) + cardW / 2;
            const cy = H / 2 + 28;
            this.buildCard(cx, cy, cardW, cardH, hero, i + 1, !this.unlocked[hero.id]);
        });

        this.add.text(W / 2, H - 24, '1 / 2 / 3  or  CLICK  to select', { fontSize: '12px', fill: C.goldS, letterSpacing: 2 }).setOrigin(0.5);

        this.input.keyboard.once('keydown-ONE',          () => this.selectHero('saint'));
        this.input.keyboard.once('keydown-TWO',          () => this.selectHero('shepherd'));
        this.input.keyboard.once('keydown-THREE',        () => this.selectHero('dachshund'));
        this.input.keyboard.once('keydown-NUMPAD_ONE',   () => this.selectHero('saint'));
        this.input.keyboard.once('keydown-NUMPAD_TWO',   () => this.selectHero('shepherd'));
        this.input.keyboard.once('keydown-NUMPAD_THREE', () => this.selectHero('dachshund'));
    }

    buildCard(cx, cy, cardW, cardH, hero, num, locked) {
        const card = this.add.rectangle(cx, cy, cardW, cardH, 0x1a0f1a, 0.95)
            .setStrokeStyle(1, locked ? 0x444444 : hero.color);

        const heroImg = this.add.image(cx, cy - 62, hero.cardKey).setDisplaySize(130, 130).setAlpha(locked ? 0.2 : 1);
        if (!locked) {
            // Float each hero with a slightly different period so they move out of sync
            this.tweens.add({
                targets: heroImg,
                y: cy - 62 - 11,
                scaleX: 1.03, scaleY: 0.98,
                duration: 1400 + (num - 1) * 220,
                ease: 'Sine.InOut',
                yoyo: true, repeat: -1,
            });
        }

        if (locked) {
            this.add.text(cx, cy - 62, '🔒', { fontSize: '36px' }).setOrigin(0.5);
            this.add.text(cx, cy - 10, 'UNLOCK\nWAVE ' + (hero.id === 'shepherd' ? 4 : 7), {
                fontSize: '11px', fill: '#888', align: 'center'
            }).setOrigin(0.5);
        }

        this.add.text(cx, cy + 12, hero.name.toUpperCase(), {
            fontSize: '13px', fill: locked ? '#555' : C.goldS, fontStyle: 'bold', letterSpacing: 1
        }).setOrigin(0.5);
        this.add.text(cx, cy + 30, hero.role, { fontSize: '10px', fill: locked ? '#444' : C.creamS }).setOrigin(0.5);

        const lg = this.add.graphics();
        lg.lineStyle(1, locked ? 0x333333 : hero.color, locked ? 0.2 : 0.5);
        lg.lineBetween(cx - 70, cy + 46, cx + 70, cy + 46);

        this.add.text(cx, cy + 62, hero.powerName, {
            fontSize: '10px', fill: locked ? '#444' : C.tealS, fontStyle: 'bold', letterSpacing: 2
        }).setOrigin(0.5);

        this.wrapText(hero.powerDesc, 22).forEach((line, li) => {
            this.add.text(cx, cy + 78 + li * 16, line, { fontSize: '10px', fill: locked ? '#333' : '#aaa', align: 'center' }).setOrigin(0.5);
        });

        this.add.text(cx, cy + cardH / 2 - 22, locked ? '—' : '[' + num + ']', {
            fontSize: '18px', fill: locked ? '#333' : C.goldS
        }).setOrigin(0.5);

        if (!locked) {
            card.setInteractive({ useHandCursor: true });
            card.on('pointerdown', () => this.selectHero(hero.id));
            card.on('pointerover', () => card.setStrokeStyle(2, hero.color));
            card.on('pointerout',  () => card.setStrokeStyle(1, hero.color));
        }
    }

    wrapText(text, maxChars) {
        const words = text.split(' ');
        const lines = [];
        let line = '';
        words.forEach(w => {
            if ((line + w).length > maxChars) { lines.push(line.trim()); line = ''; }
            line += w + ' ';
        });
        if (line.trim()) lines.push(line.trim());
        return lines;
    }

    selectHero(id) {
        if (!this.unlocked[id]) return;
        const level = this.unlockedWave >= 7 ? 'cityhall' : 'factory';
        this.scene.start('PlayScene', { heroId: id, wave: this.unlockedWave, score: this.score, level });
    }
}

        const stBg = this.add.image(W / 2, H / 2, stBgKey)
            .setAlpha(0.08).setDisplaySize(W * 1.15, H * 1.15);
        const stPan = Math.round((W * 0.15) / 2);

            duration: 30000, ease: 'Sine.InOut', yoyo: true, repeat: -1 });

        // Title band
        this.add.rectangle(W / 2, 38, W, 76, 0x110d20, 1);
        const gtop = this.add.graphics();
        gtop.lineStyle(1, C.gold, 0.4);
        gtop.lineBetween(20, 76, W - 20, 76);

        this.add.text(W / 2, 18, beat.title, { fontSize: '17px', fill: C.goldS, fontStyle: 'bold', letterSpacing: 4 }).setOrigin(0.5);

        // Unlock badge
        if (beat.unlock) {
            this.add.text(W / 2, 62, beat.unlock, { fontSize: '10px', fill: C.tealS, fontStyle: 'bold', letterSpacing: 2 }).setOrigin(0.5);

        // 2×2 panel grid
        const pw = 368, ph = 212;
        const cols = [204, W - 204];
        const rows = [H / 2 - ph / 2 - 4 + 38, H / 2 + ph / 2 + 4 + 38];

        beat.panels.forEach((panel, i) => {
            const cx = cols[i % 2];
            const cy = rows[Math.floor(i / 2)];
            this.drawPanel(cx, cy, pw, ph, panel, i, this.beatIndex);
        });

    drawPanel(cx, cy, pw, ph, panel, index, beatIndex) {
        const g = this.add.graphics();
        // Outer border
        g.lineStyle(2, C.gold, 0.65);
        g.strokeRect(cx - pw / 2, cy - ph / 2, pw, ph);
        g.lineStyle(1, C.gold, 0.18);
        g.strokeRect(cx - pw / 2 + 5, cy - ph / 2 + 5, pw - 10, ph - 10);

        // Art
        this.drawPanelArt(g, cx, cy, ph, index, beatIndex);

        // Heading
        this.add.text(cx, cy - ph / 2 + 16, panel.heading, {
            fontSize: '10px', fill: C.goldS, fontStyle: 'bold', letterSpacing: 2
        }).setOrigin(0.5);

        // Lines at bottom
        panel.lines.forEach((line, li) => {
            this.add.text(cx, cy + ph / 2 - 34 + li * 17, line, {
                fontSize: '10px', fill: C.creamS, fontStyle: 'italic'
            }).setOrigin(0.5);
        });
    }

    drawPanelArt(g, cx, cy, ph, index, beatIndex) {
        const ay = cy - ph / 2 + 30;   // art area top
        const am = cy + ph / 2 - 50;   // art area mid-bottom

        if (beatIndex === 0) {
            if (index === 0) {
                // Factory silhouette
                g.fillStyle(0x2a1520, 1);
                g.fillRect(cx - 65, am - 40, 130, 50);
                g.fillRect(cx - 45, am - 62, 18, 26);
                g.fillRect(cx + 20, am - 55, 18, 20);
                // Smoke
                g.lineStyle(1, 0x445544, 0.4);
                for (let i = 0; i < 3; i++) { g.lineBetween(cx - 36 + i*65/2, am - 62, cx - 34 + i*65/2, am - 72); }
                // Victory paw/fist symbol
                g.lineStyle(2, C.gold, 0.7);
                g.strokeCircle(cx, am - 78, 14);
                g.fillStyle(C.gold, 0.55);
                g.fillCircle(cx, am - 78, 7);
            } else if (index === 1) {
                // Ring of paws
                g.lineStyle(1, C.gold, 0.25);
                g.strokeCircle(cx, am - 30, 46);
                for (let i = 0; i < 6; i++) {
                    const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
                    const px = cx + Math.cos(a) * 46, py = am - 30 + Math.sin(a) * 46;
                    g.fillStyle(C.gold, 0.65);
                    g.fillCircle(px, py, 10);
                    // paw toe dots
                    for (let t = 0; t < 3; t++) {
                        const ta = a + (t - 1) * 0.5;
                        g.fillStyle(C.gold, 0.4);
                        g.fillCircle(px + Math.cos(ta) * 7, py + Math.sin(ta) * 7, 3);
                    }
                }
            } else if (index === 2) {
                // Picket line silhouettes
                g.fillStyle(0x3a2020, 1);
                for (let i = 0; i < 5; i++) {
                    g.fillRect(cx - 76 + i * 32, am - 28, 16, 36);
                    g.fillRect(cx - 74 + i * 32, am - 48, 2, 22);
                    g.lineStyle(1, C.gold, 0.5);
                    g.strokeRect(cx - 80 + i * 32, am - 52, 18, 8);
                }
                g.lineStyle(1, C.gold, 0.2);
                g.lineBetween(cx - 80, am + 10, cx + 80, am + 10);
            } else {
                // Road toward city hall dome
                g.lineStyle(2, C.gold, 0.35);
                g.lineBetween(cx - 85, am + 5, cx + 50, am + 5);
                g.lineStyle(2, C.gold, 0.6);
                g.beginPath();
                g.arc(cx + 50, am + 5, 32, Math.PI, 0, false);
                g.strokePath();
                g.fillStyle(0x2a2040, 1);
                g.fillRect(cx + 30, am + 5, 40, 22);

                // Arrow
                g.lineStyle(2, C.gold, 0.75);
                g.lineBetween(cx - 80, am - 20, cx + 10, am - 20);
                g.lineBetween(cx - 2, am - 30, cx + 14, am - 20);
                g.lineBetween(cx - 2, am - 10, cx + 14, am - 20);

        } else if (beatIndex === 1) {
            if (index === 0) {

                g.lineStyle(2, C.teal, 0.35);
                g.beginPath(); g.arc(cx, am - 8, 42, Math.PI, 0, false); g.strokePath();
                for (let c = 0; c < 5; c++) {
                    g.fillStyle(0x2a2550, 1);
                    g.fillRect(cx - 60 + c * 30, am - 8, 8, 46);
                }
                for (let s = 0; s < 3; s++) {
                    g.fillStyle(0x252040, 1);
                    g.fillRect(cx - 72 + s * 8, am + 38 + s * 8, 144 - s * 16, 10);

                drawDecoEyeStatic(this, cx, am - 28, C.teal, 0.4);
            } else if (index === 1) {
                // Guard line

                    g.fillStyle(0x445566, 1);
                    g.fillRect(cx - 56 + i * 30, am - 22, 18, 40);
                    g.fillStyle(0x5566aa, 0.8);
                    g.fillRect(cx - 54 + i * 30, am - 8, 14, 22);
                }
                // Approaching dogs
                g.fillStyle(C.gold, 0.45);
                for (let i = 0; i < 3; i++) { g.fillRect(cx - 110 + i * 22, am - 10, 14, 28); }
            } else if (index === 2) {
                // Authority Bark visualization
                const bx = cx - 30, by = am - 8;
                g.fillStyle(0x4a5540, 1);
                g.fillRect(bx - 14, by - 28, 22, 38);
                for (let w = 0; w < 5; w++) {
                    g.lineStyle(2, C.teal, 0.7 - w * 0.1);
                    g.beginPath();
                    g.arc(bx + 6, by, 22 + w * 18, -0.75, 0.75, false);
                    g.strokePath();
                    // Eye glyphs along arc crest
                    if (w % 2 === 0) {
                        const er = 22 + w * 18;
                        [-0.4, 0, 0.4].forEach(ea => {
                            const ex = bx + 6 + Math.cos(ea) * er;
                            const ey = by + Math.sin(ea) * er;
                            g.lineStyle(1, C.teal, 0.6);
                            g.strokeCircle(ex, ey, 4);
                            g.fillStyle(C.teal, 0.4);
                            g.fillCircle(ex, ey, 2);
                        });
                    }
                }
            } else {
                // Victory — dogs at top of steps
                for (let s = 0; s < 3; s++) {

                    g.fillRect(cx - 68 + s * 10, am + 8 + s * 10, 136 - s * 20, 12);
                }
                g.fillStyle(C.gold, 0.65);
                for (let i = 0; i < 4; i++) { g.fillRect(cx - 46 + i * 26, am - 22, 18, 32); }

        } else if (beatIndex === 2) {
